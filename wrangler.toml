name = "beltline-cloud"
main = "src/worker.js"
compatibility_date = "2024-11-20"
compatibility_flags = ["nodejs_compat"]

# Serve static assets from /public
assets = { directory = "./public" }

# API routes only (static files served normally)
routes = [
  { pattern = "beltlinecloud.com/api/*", custom_domain = true },
  { pattern = "www.beltlinecloud.com/api/*", custom_domain = true }
]

# D1 Database binding
[[d1_databases]]
binding = "DB_network"
database_name = "network"
database_id = "813a24be-1b72-426d-ab4a-5de6b6c076e7"

# R2 bucket binding
[[r2_buckets]]
binding = "R2"
bucket_name = "beltlinecloud"
preview_bucket_name = "beltlinecloud"

# Safe, non-secret variables
[vars]
R2_PUBLIC_URL = "https://pub-xxxxxx.r2.dev"
