<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rate Your Delivery — The Fast Roll</title>

    <link rel="stylesheet" href="/fast-roll/css/style.css" />
</head>

<body>

<nav class="nav">
    <div class="logo">
        <img src="/fast-roll/img/Fast-logo.png" class="logo-img" alt="The Fast Roll Logo" />
    </div>

    <div class="nav-links">
        <a href="/fast-roll/index.html#how">How It Works</a>
        <a href="/fast-roll/index.html#order">Order</a>
        <a href="/fast-roll/index.html#riders">Riders</a>
    </div>
</nav>

<div class="form-wrapper">
    <h1>Rate Your Delivery</h1>
    <p>Help keep the Beltline community safe, smooth, and fair.</p>

    <form id="reviewForm">
        <div class="form-group">
            <label>Rider Name</label>
            <input type="text" id="reviewRiderName" required />
        </div>

        <div class="form-group">
            <label>Speed Rating (1–5)</label>
            <select id="reviewSpeed" required>
                <option value="">Select</option>
                <option value="1">1 — Very Slow</option>
                <option value="2">2 — Slow</option>
                <option value="3">3 — Okay</option>
                <option value="4">4 — Fast</option>
                <option value="5">5 — Very Fast</option>
            </select>
        </div>

        <div class="form-group">
            <label>Review</label>
            <textarea id="reviewText" placeholder="How was the delivery?" required></textarea>
        </div>

        <div class="form-group">
            <label>Complaint (optional)</label>
            <textarea id="complaintText" placeholder="Describe any serious issue you had."></textarea>
        </div>

        <p class="form-note">
            By submitting, you agree that order issues are handled between you and the rider directly.
            The Fast Roll is a community connector, not the merchant.
        </p>

        <div class="form-actions">
            <button class="primary-btn" type="submit">Submit Review</button>
        </div>
    </form>
</div>

<script src="/fast-roll/js/fastroll.js"></script>
</body>
</html>
