<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start Order — The Fast Roll</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/fast-roll/img/Fast-logo.png" />

    <!-- Social Preview -->
    <meta property="og:title" content="Start a Beltline Delivery — The Fast Roll" />
    <meta property="og:description" content="Order a Beltline delivery from skaters, longboarders, e‑bikes, scooters & OneWheels." />
    <meta property="og:image" content="/fast-roll/img/fast-index.jpg" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Start a Beltline Delivery — The Fast Roll" />
    <meta name="twitter:description" content="Fast Beltline-native delivery by riders on wheels." />
    <meta name="twitter:image" content="/fast-roll/img/fast-index.jpg" />

    <link rel="stylesheet" href="/fast-roll/css/style.css" />

    <style>
        :root {
            --fast-orange: #ff7a1a;
            --fast-yellow: #ffcc00;
            --fast-dark: #05060a;
            --fast-white: #ffffff;
        }

        /* BACKGROUND */
        body {
            background: #05060a;
            color: var(--fast-dark);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("/fast-roll/img/fast-scooter-logo.jpg");
            background-size: 78%;
            background-repeat: no-repeat;
            background-position: center 8%;
            opacity: 0.18;
            z-index: -1;
        }

        /* NAV */
        .nav {
            width: 100%;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5,6,10,0.75);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(6px);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: Cinzel, serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--fast-yellow);
            text-shadow: 0 0 12px rgba(255,204,0,0.4);
        }

        .nav-links a {
            color: var(--fast-white);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.25s;
        }

        .nav-links a:hover {
            background: var(--fast-orange);
            color: #000;
        }

        /* FORM WRAPPER */
        .form-wrapper {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 18px;
            max-width: 520px;
            margin: 140px auto 80px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .form-wrapper h1 {
            font-size: 2.4rem;
            margin-bottom: 10px;
            color: var(--fast-dark);
            font-weight: 900;
        }

        .form-wrapper p {
            opacity: 0.85;
            margin-bottom: 30px;
            font-size: 1.05rem;
        }

        /* FORM GROUP */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--fast-dark);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.25);
            background: rgba(255,255,255,0.6);
            color: #000;
            font-size: 1rem;
            transition: 0.25s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--fast-orange);
            box-shadow: 0 0 12px rgba(255,122,26,0.45);
            outline: none;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        .form-note {
            font-size: 0.9rem;
            opacity: 0.75;
            margin-bottom: 20px;
        }

        /* BUTTON */
        .primary-btn {
            width: 100%;
            padding: 16px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, var(--fast-orange), var(--fast-yellow));
            color: #000;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(0,0,0,0.55);
            transition: 0.25s;
        }

        .primary-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 30px rgba(255,204,0,0.45);
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .form-wrapper {
                margin: 120px 20px 60px;
                padding: 30px;
            }

            .form-wrapper h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <nav class="nav">
        <div class="logo">THE FAST ROLL</div>
        <div class="nav-links">
            <a href="/fast-roll/index.html">Home</a>
        </div>
    </nav>

    <main class="form-wrapper">
        <h1>Start Your Delivery</h1>
        <p>Tell us what you bought and where you want it delivered.</p>

        <form id="orderForm">

            <div class="form-group">
                <label>What did you buy?</label>
                <input type="text" id="item" placeholder="2 scoops from Jeni’s…" required />
            </div>

            <div class="form-group">
                <label>Store name</label>
                <input type="text" id="store" placeholder="Store or restaurant" required />
            </div>

            <div class="form-group">
                <label>Dropoff location</label>
                <textarea id="dropoff" placeholder="Exact spot or address near the Beltline" required></textarea>
            </div>

            <div class="form-group">
                <label>Item value (max $50 for new riders)</label>
                <input type="number" id="value" min="1" max="50" required />
            </div>

            <div class="form-group">
                <label>Item weight (lbs)</label>
                <input type="number" id="weight" min="1" max="50" required />
            </div>

            <div class="form-group">
                <label>Tip Your Rider (optional)</label>
                <select id="tipPre">
                    <option value="0">$0</option>
                    <option value="2">$2</option>
                    <option value="5">$5</option>
                    <option value="10">$10</option>
                    <option value="custom">Custom</option>
                </select>
            </div>

            <div class="form-group" id="customTipWrapper" style="display:none;">
                <label>Custom Tip Amount</label>
                <input type="number" id="tipCustom" min="1" />
            </div>

            <p class="form-note">
                After submitting, you’ll upload your receipt and complete payment via PayPal.
            </p>

            <button class="primary-btn" type="submit">Continue</button>
        </form>
    </main>

    <script src="/fast-roll/js/fastroll.js"></script>
</body>
</html>
