<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start Order — The Fast Roll</title>

    <link rel="icon" type="image/png" href="/fast-roll/img/Fast-logo.png" />
    <link rel="stylesheet" href="/fast-roll/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --fast-orange: #ff7a1a;
            --fast-yellow: #ffcc00;
            --fast-dark: #05060a;
            --fast-white: #ffffff;
        }

        body {
            background: #05060a;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("/fast-roll/img/fast-scooter-logo.jpg");
            background-size: 78%;
            background-repeat: no-repeat;
            background-position: center 8%;
            opacity: 0.18;
            z-index: -1;
        }

        .nav {
            width: 100%;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5,6,10,0.75);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(6px);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: Cinzel, serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--fast-yellow);
            text-shadow: 0 0 12px rgba(255,204,0,0.4);
        }

        .form-wrapper {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 18px;
            max-width: 520px;
            margin: 140px auto 80px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.25);
            background: rgba(255,255,255,0.6);
            color: #000;
            font-size: 1rem;
        }

        /* RECEIPT CAMERA BLOCK */
        #receiptCaptureBlock {
            background: rgba(0,0,0,0.65);
            border: 1px solid rgba(255,215,0,0.35);
            border-radius: 20px;
            padding: 25px;
            max-width: 520px;
            margin: 40px auto;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        #receiptCaptureBlock h2 {
            font-family: Cinzel;
            color: var(--fast-yellow);
        }

        #receiptInput {
            padding: 12px;
            background: #111;
            border: 2px solid var(--fast-yellow);
            border-radius: 12px;
            color: white;
            font-family: Cinzel;
            width: 100%;
        }

        #receiptStatus {
            margin-top: 20px;
            font-family: Cinzel;
            color: var(--fast-yellow);
        }
    </style>
</head>

<body>

    <nav class="nav">
        <div class="logo">THE FAST ROLL</div>
        <div class="nav-links">
            <a href="/fast-roll/index.html">Home</a>
        </div>
    </nav>

    <main class="form-wrapper">
        <h1>Start Your Delivery</h1>
        <p>Tell us what you bought and where you want it delivered.</p>

        <form id="orderForm">

            <div class="form-group">
                <label>What did you buy?</label>
                <input type="text" id="item" required />
            </div>

            <div class="form-group">
                <label>Store name</label>
                <input type="text" id="store" required />
            </div>

            <div class="form-group">
                <label>Dropoff location</label>
                <textarea id="dropoff" required></textarea>
            </div>

            <div class="form-group">
                <label>Item value (max $50 for new riders)</label>
                <input type="number" id="value" min="1" max="50" required />
            </div>

            <div class="form-group">
                <label>Item weight (lbs)</label>
                <input type="number" id="weight" min="1" max="50" required />
            </div>

            <div class="form-group">
                <label>Tip Your Rider (optional)</label>
                <select id="tipPre">
                    <option value="0">$0</option>
                    <option value="2">$2</option>
                    <option value="5">$5</option>
                    <option value="10">$10</option>
                    <option value="custom">Custom</option>
                </select>
            </div>

            <div class="form-group" id="customTipWrapper" style="display:none;">
                <label>Custom Tip Amount</label>
                <input type="number" id="tipCustom" min="1" />
            </div>

            <p class="form-note">
                After submitting, you’ll upload your receipt and complete payment via PayPal.
            </p>

            <button class="primary-btn" type="submit">Continue</button>
        </form>
    </main>

    <!-- RECEIPT CAMERA MODULE -->
    <div id="receiptCaptureBlock">
        <h2>Upload Receipt</h2>
        <p>Take a photo or upload a screenshot. The Cloud will read it automatically.</p>

        <input id="receiptInput" type="file" accept="image/*" capture="environment">
        <div id="receiptStatus"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="/fast-roll/js/order.js"></script>

</body>
</html>
