<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — The Fast Roll</title>

    <meta property="og:title" content="Create Your Fast Roll Account" />
    <meta property="og:image" content="../../public/img/fast-index.jpg" />
    <meta property="og:description" content="Create your account to order Beltline deliveries instantly." />

    <link rel="stylesheet" href="../../css/style.css" />
</head>

<body>

    <!-- NAV -->
    <nav class="nav">
        <div class="logo">THE FAST ROLL</div>
        <div class="nav-links">
            <a href="../../index.html">Home</a>
            <a href="signup.html">Sign Up</a>
        </div>
    </nav>

    <!-- SIGNUP FORM -->
    <main class="form-wrapper">
        <h1>Create Your Account</h1>
        <p>Sign up to start ordering Beltline deliveries instantly.</p>

        <form id="clientSignupForm">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name" type="text" placeholder="Your full name" required />
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" type="email" placeholder="you@example.com" required />
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input id="phone" type="tel" placeholder="(555) 555‑5555" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Create a password" required />
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input id="confirm" type="password" placeholder="Re‑enter password" required />
            </div>

            <div class="form-group">
                <label style="display:flex; align-items:center; gap:10px;">
                    <input id="terms" type="checkbox" required />
                    I agree to The Fast Roll terms & policies.
                </label>
            </div>

            <div class="form-actions">
                <button class="primary-btn" type="submit">Create Account</button>
            </div>

        </form>
    </main>

    <footer>
        <p>© 2026 The Fast Roll — Built for the Atlanta Beltline</p>
    </footer>

    <script src="../../js/app.js"></script>
</body>
</html>
