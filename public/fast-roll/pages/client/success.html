<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delivery Complete — The Fast Roll</title>

    <meta property="og:title" content="Delivery Complete — The Fast Roll" />
    <meta property="og:image" content="../../public/img/fast-index.jpg" />

    <link rel="stylesheet" href="../../css/style.css" />
</head>

<body>

    <nav class="nav">
        <div class="logo">THE FAST ROLL</div>
        <div class="nav-links">
            <a href="../../index.html">Home</a>
        </div>
    </nav>

    <section class="section">
        <h2>Delivery Complete</h2>
        <p class="section-sub">Thanks for rolling with us.</p>

        <div class="order-panel">
            <h3>Your item has been delivered!</h3>
            <p>We hope your Beltline day is even better now.</p>
        </div>

        <div class="order-panel" style="margin-top:25px;">
            <h3>Tip Your Rider?</h3>

            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="primary-btn" onclick="sendPostTip(2)">$2</button>
                <button class="primary-btn" onclick="sendPostTip(5)">$5</button>
                <button class="primary-btn" onclick="sendPostTip(10)">$10</button>
            </div>

            <div class="form-group" style="margin-top:20px;">
                <input id="tipPostCustom" type="number" placeholder="Custom amount" />
                <button class="secondary-btn" onclick="sendPostTip(document.getElementById('tipPostCustom').value)">Send Tip</button>
            </div>
        </div>

        <div style="margin-top:30px;">
            <button class="primary-btn" onclick="window.location='../../index.html'">Return Home</button>
        </div>
    </section>

    <script src="/fast-roll/js/fastroll.js"></script>
</body>
</html>
