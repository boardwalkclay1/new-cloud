<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Profile — The Fast Roll</title>

    <link rel="stylesheet" href="/fast-roll/css/style.css" />
</head>

<body>

<nav class="nav">
    <div class="logo">
        <img src="/fast-roll/img/Fast-logo.png" class="logo-img" />
    </div>

    <div class="nav-links">
        <a href="/fast-roll/index.html#how">How It Works</a>
        <a href="/fast-roll/index.html#order">Order</a>
        <a href="/fast-roll/index.html#riders">Riders</a>
    </div>
</nav>

<div class="form-wrapper">
    <h1>Your Profile</h1>
    <p>Save your info so you never have to re‑enter it.</p>

    <form id="clientProfileForm">

        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="clientName" required />
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="clientPhone" required />
        </div>

        <div class="form-group">
            <label>Profile Photo</label>
            <input type="file" id="clientPhoto" accept="image/*" />
        </div>

        <div class="form-group">
            <label>Your Favorite Riders</label>
            <div id="favoriteRiders" class="rider-grid"></div>
        </div>

        <button class="primary-btn" type="submit">Save Profile</button>

        <button class="secondary-btn" onclick="location.href='/pages/client/order.html'" type="button">
            Back to Ordering
        </button>
    </form>
</div>

<script src="/fast-roll/js/app.js"></script>
<script src="/fast-roll/js/clientProfile.js"></script>
</body>
</html>
