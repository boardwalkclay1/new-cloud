<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rider Login — The Fast Roll</title>

    <link rel="stylesheet" href="/fast-roll/css/style.css" />

    <style>
        body {
            background: url('/fast-roll/img/fast-longboard.jpg') center/cover no-repeat fixed;
            background-color: #05060a;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.55),
                rgba(0,0,0,0.75)
            );
            z-index: -1;
        }
    </style>
</head>

<body>

<nav class="nav">
    <div class="logo">
        <img src="/fast-roll/img/Fast-logo.png" class="logo-img" alt="The Fast Roll Logo" />
    </div>
    <div class="nav-links">
        <a href="/fast-roll/index.html#how">How It Works</a>
        <a href="/fast-roll/index.html#order">Order</a>
        <a href="/fast-roll/index.html#riders">Riders</a>
    </div>
</nav>

<div class="form-wrapper" style="margin-top:140px;">
    <h1>Rider Login</h1>
    <p>Access your dashboard and start taking jobs.</p>

    <form id="riderLoginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required />
        </div>

        <button class="primary-btn" type="submit">Login</button>
    </form>
</div>

<script src="/fast-roll/js/fastroll.js"></script>
</body>
</html>
