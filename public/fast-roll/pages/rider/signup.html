<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rider Signup — The Fast Roll</title>

    <link rel="stylesheet" href="/fast-roll/css/style.css" />

    <style>
        /* BACKGROUND */
        body {
            background: url('/fast-roll/img/fast-longboard.jpg') center/cover no-repeat fixed;
            background-color: #05060a;
            color: #fff;
            overflow-x: hidden;
        }

        /* DARK GRADIENT OVERLAY */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.45),
                rgba(0,0,0,0.75)
            );
            z-index: -1;
        }

        /* PAGE WRAPPER */
        .form-wrapper {
            max-width: 520px;
            margin: 160px auto 80px;
            background: rgba(5,6,10,0.78);
            padding: 40px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 18px 40px rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .form-wrapper h1 {
            font-size: 2.4rem;
            margin-bottom: 10px;
            color: #ffcc00;
            text-shadow: 0 0 20px rgba(255,204,0,0.4);
        }

        .form-wrapper p {
            opacity: 0.85;
            margin-bottom: 30px;
            font-size: 1.05rem;
        }

        /* FORM GROUP */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #ffcc00;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 1rem;
            transition: 0.25s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #ff7a1a;
            box-shadow: 0 0 12px rgba(255,122,26,0.45);
            outline: none;
        }

        /* CHECKBOX */
        .form-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #ff7a1a;
            cursor: pointer;
        }

        /* BUTTON */
        .primary-btn {
            width: 100%;
            padding: 16px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #ff7a1a, #ffcc00);
            color: #000;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(0,0,0,0.55);
            transition: 0.25s;
            margin-top: 10px;
        }

        .primary-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 30px rgba(255,204,0,0.45);
        }

        /* NAV FIX */
        .nav {
            backdrop-filter: blur(6px);
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .form-wrapper {
                margin: 140px 20px 60px;
                padding: 30px;
            }

            .form-wrapper h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

<nav class="nav">
    <div class="logo">
        <img src="/fast-roll/img/Fast-logo.png" class="logo-img" alt="The Fast Roll Logo" />
    </div>
    <div class="nav-links">
        <a href="/fast-roll/index.html#how">How It Works</a>
        <a href="/fast-roll/index.html#order">Order</a>
        <a href="/fast-roll/index.html#riders">Riders</a>
    </div>
</nav>

<div class="form-wrapper">
    <h1>Become a Rider</h1>
    <p>Longboarders, skaters, e‑bikes, OneWheels — roll the Beltline and get paid.</p>

    <form id="riderSignupForm">
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="riderName" required />
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="riderPhone" required />
        </div>

        <div class="form-group">
            <label>Vehicle</label>
            <select id="riderVehicle">
                <option value="longboard">Longboard</option>
                <option value="inlines">Inline Skates</option>
                <option value="skateboard">Skateboard</option>
                <option value="escooter">E‑Scooter</option>
                <option value="ebike">E‑Bike</option>
                <option value="onewheel">OneWheel</option>
            </select>
        </div>

        <div class="form-group">
            <label>PayPal Email</label>
            <input type="email" id="riderPaypal" required />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="riderPassword" required />
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="riderConfirm" required />
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="riderTerms" />
                I agree that I ride at my own risk and The Fast Roll is not liable.
            </label>
        </div>

        <button class="primary-btn" type="submit">Create Rider Account</button>
    </form>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
