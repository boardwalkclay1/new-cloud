<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rider Dashboard — The Fast Roll</title>

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/fast-roll/img/Fast-logo.jpg">

    <!-- Social Preview -->
    <meta property="og:title" content="Rider Dashboard — The Fast Roll">
    <meta property="og:description" content="Your jobs, tools, and profile — all in one place.">
    <meta property="og:image" content="/fast-roll/img/rider.jpg">

    <link rel="stylesheet" href="/fast-roll/css/style.css" />

    <style>
        body {
            background: url('/fast-roll/img/rider.jpg') center/cover no-repeat fixed;
            background-color: #05060a;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.55),
                rgba(0,0,0,0.75)
            );
            z-index: -1;
        }
    </style>
</head>

<body>

<nav class="nav">
    <div class="logo">
        <img src="/fast-roll/img/Fast-logo.png" class="logo-img" alt="The Fast Roll Logo" />
    </div>

    <div class="nav-links">
        <a href="/fast-roll/index.html#how">How It Works</a>
        <a href="/fast-roll/index.html#order">Order</a>
        <a href="/fast-roll/index.html#riders">Riders</a>
    </div>
</nav>

<div class="form-wrapper" style="margin-top:140px;">
    <h1>Rider Dashboard</h1>
    <p>Your zone, your jobs, your tools — all in one place.</p>

    <!-- PROFILE SUMMARY -->
    <div class="form-group">
        <label>Your Profile</label>
        <div id="riderProfileSummary" class="form-note"></div>
        <button class="secondary-btn" onclick="location.href='/fast-roll/pages/rider/profile.html'">
            Edit Profile
        </button>
    </div>

    <!-- JOB LIST -->
    <div class="form-group">
        <label>Available Jobs</label>
        <div id="jobList" class="rider-grid"></div>
    </div>

    <!-- ACTIVE DELIVERY -->
    <div class="form-group">
        <label>Active Delivery</label>
        <div id="activeDelivery" class="rider-card">No active delivery.</div>
    </div>

    <!-- STATUS -->
    <div class="form-group">
        <label>Safety & Status</label>
        <div id="riderStatus" class="form-note"></div>

        <button class="secondary-btn" onclick="location.href='/fast-roll/pages/rider/agreement.html'">
            Rider Agreement
        </button>

        <button class="secondary-btn" onclick="location.href='/fast-roll/pages/rider/how-it-works.html'">
            How Riding Works
        </button>
    </div>

    <button class="secondary-btn" onclick="location.href='/fast-roll/pages/rider/login.html'">
        Log Out
    </button>
</div>

<script src="/fast-roll/js/rider.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    const rider = FastRiderAuth.current();
    if (!rider) {
        window.location.href = "/fast-roll/pages/rider/login.html";
        return;
    }

    // PROFILE SUMMARY
    document.getElementById("riderProfileSummary").innerHTML = `
        <strong>${rider.name}</strong><br>
        Vehicle: ${rider.vehicle}<br>
        Phone: ${rider.phone}<br>
        PayPal: ${rider.paypal || "Not set"}
    `;

    // STATUS
    document.getElementById("riderStatus").innerHTML = `
        Status: <strong>${rider.status || "offline"}</strong>
    `;

    // JOB LIST
    const jobs = await fastRiderLoadJobs();
    const jobList = document.getElementById("jobList");

    if (!jobs.length) {
        jobList.innerHTML = `<p style="opacity:0.7;">No jobs available right now.</p>`;
    } else {
        jobList.innerHTML = jobs.map(job => `
            <div class="rider-card">
                <h3>${job.id}</h3>
                <p><strong>Pickup:</strong> ${job.pickup}</p>
                <p><strong>Dropoff:</strong> ${job.dropoff}</p>
                <p><strong>Payout:</strong> $${job.price || job.payout || 0}</p>
                <button class="primary-btn" onclick="fastRiderAcceptJob('${job.id}')">
                    Accept Job
                </button>
            </div>
        `).join("");
    }

    // ACTIVE DELIVERY
    const active = jobs.find(j => j.status === "assigned");
    if (active) {
        document.getElementById("activeDelivery").innerHTML = `
            <strong>Delivery Active</strong><br>
            Pickup: ${active.pickup}<br>
            Dropoff: ${active.dropoff}<br>
            <button class="primary-btn" onclick="fastRiderCompleteJob('${active.id}')">
                Mark Complete
            </button>
        `;
    }
});
</script>

</body>
</html>
