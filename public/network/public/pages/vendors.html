<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vendors — The Network</title>
    <link rel="icon" type="image/jpeg" href="/network/public/img/network-logo.jpg">

    <style>
        body {
            margin:0;
            padding:0;
            background:url('/network/public/img/network-back.jpg') no-repeat center center fixed;
            background-size:cover;
            font-family:Arial,sans-serif;
            color:white;
            overflow-x:hidden;
            font-size:18px;
        }

        .lightning {
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            pointer-events:none;
            background:radial-gradient(circle, rgba(255,255,0,0.25) 0%, transparent 70%);
            opacity:0;
            animation:lightningFlash 6s infinite;
        }

        @keyframes lightningFlash {
            0%,93%,100% { opacity:0; }
            94% { opacity:0.9; }
            95% { opacity:0.2; }
            96% { opacity:0.8; }
        }

        .network-header {
            text-align:center;
            padding:40px 20px;
            background:rgba(0,0,0,0.55);
            border-bottom:2px solid gold;
            box-shadow:0 0 25px rgba(0,150,255,0.7);
        }

        .network-header img {
            width:150px;
            margin-bottom:10px;
            filter:drop-shadow(0 0 12px rgba(0,150,255,0.9));
        }

        .network-header h1 {
            margin:0;
            font-size:38px;
            color:gold;
            text-shadow:0 0 12px rgba(0,150,255,1);
        }

        .network-header p {
            margin-top:8px;
            font-size:18px;
            color:#d4e8ff;
        }

        .grid {
            width:92%;
            max-width:1100px;
            margin:30px auto;
            display:flex;
            flex-wrap:wrap;
            gap:20px;
        }

        .card {
            flex:1 1 calc(50% - 20px);
            min-width:260px;
            background:rgba(0,0,0,0.55);
            border:2px solid gold;
            border-radius:14px;
            padding:20px;
            box-shadow:0 0 15px rgba(0,150,255,0.5);
            transition:0.25s;
            cursor:pointer;
        }

        .card:hover {
            transform:translateY(-4px);
            box-shadow:0 0 25px rgba(0,150,255,1);
        }

        .card h2 {
            margin:0 0 8px;
            font-size:22px;
            color:gold;
        }

        .card p {
            margin:0;
            font-size:16px;
            color:#d4e8ff;
        }

        /* SIGNUP CARD — stands out */
        .signup-card {
            background:rgba(0,0,0,0.75);
            border:2px solid #00c3ff;
            box-shadow:0 0 25px rgba(0,200,255,0.9);
        }

        .signup-card:hover {
            box-shadow:0 0 35px rgba(0,200,255,1);
            transform:translateY(-6px);
        }

        @media (max-width:700px) {
            .card {
                flex:1 1 100%;
            }
        }
    </style>
</head>

<body>

<div class="lightning"></div>

<header class="network-header">
    <img src="/network/public/img/network-logo.jpg" alt="The Network Logo">
    <h1>Vendors</h1>
    <p>All Beltline vendors in one place. Browse profiles and discover new favorites.</p>
</header>

<section class="grid" id="vendors-grid">

    <!-- ⭐ SIGNUP TILE (always first) -->
    <div class="card signup-card" onclick="location.href='/network/staff/pages/signup.html'">
        <h2>✨ Become a Vendor</h2>
        <p>Join The Network and create your vendor profile today.</p>
    </div>

    <!-- Vendor cards filled by network.js -->
</section>

<script src="../js/network.js"></script>
<script>
    Network.loadVendors();
</script>

</body>
</html>
