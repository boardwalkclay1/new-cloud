<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Network — Boardwalk Beltline</title>

    <link rel="icon" type="image/jpeg" href="/network/public/img/network-logo.jpg">
    <link rel="stylesheet" href="/network/public/css/style.css">

    <style>
        .network-nodes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
            padding: 25px;
        }
        .node {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 18px;
            padding: 28px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s ease;
            backdrop-filter: blur(6px);
        }
        .node:hover {
            background: rgba(255,255,255,0.18);
            transform: translateY(-4px);
        }
        .node-icon {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 8px;
        }
        .node-label {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
        }
        @media (max-width: 600px) {
            .network-nodes {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .panel {
            padding: 25px;
        }
    </style>
</head>

<body>

<header class="network-header">
    <a href="/network/public/pages/signup.html" class="header-btn left-btn">Sign Up</a>
    <a href="/network/public/pages/login.html" class="header-btn right-btn">Login</a>

    <img src="/network/public/img/network-logo.jpg" class="network-logo">
    <h1 class="network-title">The Network</h1>
    <p class="network-subtitle">The Beltline’s official hub of creators, vendors, workshops, and services.</p>
</header>

<!-- ⭐ GRID OF SQUARES -->
<section class="network-nodes">

    <div class="node" onclick="location.href='/network/public/pages/about.html'">
        <span class="node-icon">🌐</span>
        <span class="node-label">About</span>
    </div>

    <div class="node" onclick="location.href='/network/public/pages/vendors.html'">
        <span class="node-icon">🛍️</span>
        <span class="node-label">Vendors</span>
    </div>

    <div class="node" onclick="location.href='/network/public/pages/services.html'">
        <span class="node-icon">🧰</span>
        <span class="node-label">Services</span>
    </div>

    <div class="node" onclick="location.href='/network/public/pages/products.html'">
        <span class="node-icon">📦</span>
        <span class="node-label">Products</span>
    </div>

    <div class="node" onclick="location.href='/network/public/pages/explore.html'">
        <span class="node-icon">🧭</span>
        <span class="node-label">Explore</span>
    </div>

    <div class="node" onclick="location.href='/network/public/pages/map.html'">
        <span class="node-icon">🗺️</span>
        <span class="node-label">Map</span>
    </div>

    <div class="node" onclick="location.href='/network/public/pages/delivery.html'">
        <span class="node-icon">🚚</span>
        <span class="node-label">Fast Roll</span>
    </div>

    <div class="node" onclick="location.href='/network/public/pages/profile.html'">
        <span class="node-icon">👤</span>
        <span class="node-label">My Profile</span>
    </div>

    <div class="node" onclick="location.href='/network/public/pages/settings.html'">
        <span class="node-icon">⚙️</span>
        <span class="node-label">Settings</span>
    </div>

    <div class="node" onclick="location.href='/network/public/pages/apply.html'">
        <span class="node-icon">📝</span>
        <span class="node-label">Become a Vendor</span>
    </div>

</section>

<!-- ⭐ FEEDS OUTSIDE THE GRID -->
<section class="panel">
    <h2>🔥 Trending Vendors</h2>
    <div class="scroll-feed" id="vendors-feed"></div>
</section>

<section class="panel">
    <h2>🛍️ Popular Products</h2>
    <div class="scroll-feed" id="products-feed"></div>
</section>

<section class="panel">
    <h2>🧰 Featured Services</h2>
    <div class="scroll-feed" id="services-feed"></div>
</section>

<!-- ⭐ FIXED JS PATHS -->
<script src="/network/public/js/app.js"></script>
<script src="/network/public/js/network.js"></script>

<!-- ⭐ THIS IS WHAT MAKES THE FEEDS WORK -->
<script>
    Network.loadHomeFeeds();
</script>

</body>
</html>
