<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vendor — The Network</title>
    <link rel="icon" type="image/jpeg" href="/network/public/img/network-logo.jpg">

    <style>
        body { margin:0; padding:0; background:url('/network/public/img/network-back.jpg') no-repeat center center fixed;
               background-size:cover; font-family:Arial,sans-serif; color:white; overflow-x:hidden; font-size:18px; }
        .lightning { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none;
                     background:radial-gradient(circle, rgba(255,255,0,0.25) 0%, transparent 70%);
                     opacity:0; animation:lightningFlash 6s infinite; }
        @keyframes lightningFlash { 0%,93%,100%{opacity:0;} 94%{opacity:0.9;} 95%{opacity:0.2;} 96%{opacity:0.8;} }
        .network-header { text-align:center; padding:40px 20px; background:rgba(0,0,0,0.55);
                          border-bottom:2px solid gold; box-shadow:0 0 25px rgba(0,150,255,0.7); }
        .network-header img { width:140px; margin-bottom:10px; filter:drop-shadow(0 0 12px rgba(0,150,255,0.9)); }
        .network-header h1 { margin:0; font-size:36px; color:gold; text-shadow:0 0 12px rgba(0,150,255,1); }
        .network-header p { margin-top:8px; font-size:18px; color:#d4e8ff; }

        .container { width:92%; max-width:1100px; margin:30px auto; background:rgba(0,0,0,0.55);
                     border:2px solid gold; border-radius:14px; padding:20px; box-shadow:0 0 15px rgba(0,150,255,0.5); }
        .vendor-header { display:flex; flex-wrap:wrap; gap:20px; align-items:center; }
        .vendor-photo { width:140px; height:140px; border-radius:50%; background:#111; border:2px solid gold;
                        box-shadow:0 0 15px rgba(0,150,255,0.7); }
        .vendor-info h2 { margin:0 0 8px; font-size:26px; color:gold; }
        .vendor-info p { margin:0; font-size:18px; color:#d4e8ff; }

        .section-title { margin-top:25px; font-size:22px; color:gold; }
        .items-grid { display:flex; flex-wrap:wrap; gap:15px; margin-top:10px; }
        .item-card { flex:1 1 calc(50% - 15px); min-width:240px; background:rgba(0,0,0,0.6); border:1px solid gold;
                     border-radius:12px; padding:15px; box-shadow:0 0 10px rgba(0,150,255,0.5); }
        .item-card h3 { margin:0 0 6px; font-size:18px; color:gold; }
        .item-card p { margin:0; font-size:16px; color:#d4e8ff; }
        .item-card button { margin-top:10px; padding:8px 14px; border-radius:8px; border:1px solid gold;
                            background:rgba(0,0,0,0.7); color:gold; cursor:pointer; transition:0.2s; }
        .item-card button:hover { background:gold; color:black; box-shadow:0 0 15px rgba(0,150,255,1); }
    </style>
</head>
<body>

    <div class="lightning"></div>

    <header class="network-header">
        <img src="/network/public/img/network-logo.jpg" alt="The Network Logo">
        <h1>Vendor Profile</h1>
        <p>View vendor details, products, and workshops.</p>
    </header>

    <section class="container" id="vendor-container">
        <!-- Filled by network.js -->
    </section>

    <script src="../js/network.js"></script>
    <script>
        Network.loadVendor();
    </script>
</body>
</html>
