<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vendor Dashboard — The Network</title>

<link rel="icon" type="image/jpeg" href="/network/public/img/network-logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: url('/assets/img/cloud/cumulus.jpg') center/cover no-repeat fixed;
    color: white;
  }

  /* DARK OVERLAY */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: -1;
  }

  /* FLOATING LOGO MENU */
  .vendor-logo {
    height: 160px;
    width: auto;
    display: block;
    margin: 30px auto 10px auto;
    cursor: pointer;
    animation: floaty 6s infinite ease-in-out;
    filter: drop-shadow(0px 0px 25px rgba(255,255,255,0.35));
  }

  @keyframes floaty {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
  }

  /* MENU */
  .menu-panel {
    position: fixed;
    top: 0;
    right: -350px;
    width: 350px;
    height: 100vh;
    background: rgba(10,42,67,0.95);
    border-left: 3px solid #f7d354;
    padding: 25px;
    transition: 0.35s ease;
    overflow-y: auto;
    z-index: 9999;
  }

  .menu-panel.open {
    right: 0;
  }

  .menu-panel h2 {
    font-family: Cinzel;
    color: #f7d354;
    margin-bottom: 20px;
  }

  .menu-panel a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 10px 0;
    font-size: 1.1rem;
  }

  .menu-panel a:hover {
    color: #f7d354;
  }

  /* DASHBOARD TITLE */
  .dash-title {
    text-align: center;
    font-family: Cinzel;
    font-size: 2.4rem;
    color: #f7d354;
    margin-top: 10px;
    text-shadow: 0 0 12px #f7d354;
  }

  /* TWO MAIN CARDS */
  .card-row {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-top: 40px;
    flex-wrap: wrap;
  }

  .dash-card {
    width: 45%;
    min-width: 350px;
    background: rgba(10,42,67,0.85);
    border: 3px solid #f7d354;
    border-radius: 16px;
    padding: 25px;
    animation: fadeIn 1s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .dash-card h3 {
    font-family: Cinzel;
    color: #f7d354;
    margin-bottom: 15px;
    text-align: center;
  }

  /* TILE BUTTONS */
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
  }

  .tile {
    background: rgba(255,255,255,0.08);
    border: 2px solid #f7d354;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: 0.25s ease;
    font-size: 1rem;
  }

  .tile:hover {
    background: #f7d354;
    color: black;
    transform: scale(1.05);
  }

  /* LOGOUT */
  .logout-btn {
    display: block;
    margin: 40px auto;
    width: 200px;
    padding: 12px;
    border-radius: 10px;
    background: transparent;
    border: 2px solid #f7d354;
    color: #f7d354;
    cursor: pointer;
    transition: 0.25s ease;
    font-size: 1.1rem;
  }

  .logout-btn:hover {
    background: #f7d354;
    color: black;
  }
</style>
</head>

<body>

<!-- FLOATING LOGO -->
<img src="/network/public/img/network-logo.jpg"
     class="vendor-logo"
     onclick="document.getElementById('menuPanel').classList.add('open')">

<h1 class="dash-title">Vendor Dashboard</h1>

<!-- TWO MAIN CARDS -->
<div class="card-row">

  <!-- CARD 1 -->
  <div class="dash-card">
    <h3>Your Business</h3>

    <div class="tile-grid">
      <div class="tile" onclick="Staff.go('profile.html')">Profile</div>
      <div class="tile" onclick="Staff.go('products.html')">Products</div>
      <div class="tile" onclick="Staff.go('services.html')">Services</div>
      <div class="tile" onclick="Staff.go('workshops.html')">Workshops</div>
      <div class="tile" onclick="Staff.go('app.html')">Digital App</div>
    </div>
  </div>

  <!-- CARD 2 -->
  <div class="dash-card">
    <h3>Sales & Tools</h3>

    <div class="tile-grid">
      <div class="tile" onclick="Staff.go('ads.html')">Vendor Ads</div>
      <div class="tile" onclick="Staff.go('orders.html')">Orders</div>
      <div class="tile" onclick="Staff.go('payouts.html')">Payouts</div>
      <div class="tile" onclick="Staff.go('analytics.html')">Analytics</div>
      <div class="tile" onclick="Staff.go('settings.html')">Settings</div>
    </div>
  </div>

</div>

<!-- LOGOUT -->
<button class="logout-btn" onclick="Staff.go('logout.html')">Log Out</button>

<!-- MENU PANEL -->
<div id="menuPanel" class="menu-panel">
  <h2>Vendor Menu</h2>

  <a onclick="Staff.go('profile.html')">Profile</a>
  <a onclick="Staff.go('products.html')">Products</a>
  <a onclick="Staff.go('services.html')">Services</a>
  <a onclick="Staff.go('workshops.html')">Workshops</a>
  <a onclick="Staff.go('app.html')">Digital App</a>
  <a onclick="Staff.go('ads.html')">Vendor Ads</a>
  <a onclick="Staff.go('orders.html')">Orders</a>
  <a onclick="Staff.go('payouts.html')">Payouts</a>
  <a onclick="Staff.go('analytics.html')">Analytics</a>

  <!-- PHONE BOOK MOVED HERE -->
  <a onclick="Staff.go('phonebook.html')">Phone Book Listing</a>

  <a onclick="document.getElementById('menuPanel').classList.remove('open')" style="margin-top:20px;">Close Menu</a>
</div>

<script src="/network/staff/js/staff.js"></script>
<script>
  Staff.initDashboard();
</script>

</body>
</html>
