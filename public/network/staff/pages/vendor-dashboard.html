<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Dashboard</title>

<link rel="icon" type="image/jpg" href="/network/img/network-logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --yellow: #f7d354;
  --white: #ffffff;
  --dark: #000;
}

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: var(--white);
}

/* HEADER */
header {
  text-align: center;
  padding: 25px 20px;
  background: rgba(0,0,0,0.65);
  border-bottom: 2px solid var(--yellow);
}

header h1 {
  margin: 0;
  font-size: 32px;
  color: var(--yellow);
}

/* CLOUD ICONS */
.cloud-row {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 20px;
  margin-bottom: 25px;
}

.cloud-row img {
  height: 160px;
  width: auto;
  object-fit: contain;
  cursor: pointer;
  animation: pulse 2.2s infinite ease-in-out;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.12); }
  100% { transform: scale(1); }
}

/* STATS */
.center-stats {
  text-align: center;
  margin-top: 10px;
  margin-bottom: 30px;
  font-family: 'Cinzel', serif;
}

.center-stats .stat {
  font-size: 1.2rem;
  margin: 6px 0;
  color: var(--yellow);
}

/* PRODUCT GRID */
.container {
  width: 92%;
  max-width: 900px;
  margin: 25px auto;
}

.add-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: var(--yellow);
  color: #000;
  border-radius: 10px;
  font-weight: 700;
  text-align: center;
  text-decoration: none;
  margin-bottom: 20px;
}

/* SQUARE PRODUCT CARDS */
.product-card {
  background: rgba(0,0,0,0.55);
  border: 2px solid var(--yellow);
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 20px;
}

.product-card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}

.product-card h3 {
  margin: 0;
  color: var(--yellow);
  font-size: 1.4rem;
}

.product-card p {
  margin: 6px 0;
  color: #d4e8ff;
}

/* EDITING */
.edit-row {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.edit-row input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 2px solid var(--yellow);
  background: #111;
  color: var(--white);
}

.edit-actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.edit-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 2px solid var(--yellow);
  background: rgba(0,0,0,0.7);
  color: var(--yellow);
  cursor: pointer;
  font-weight: 600;
}

.edit-actions button:hover {
  background: var(--yellow);
  color: #000;
}

.visibility-toggle {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 2px solid var(--yellow);
  background: rgba(0,0,0,0.7);
  color: var(--yellow);
  cursor: pointer;
  font-weight: 600;
}

.visibility-toggle:hover {
  background: var(--yellow);
  color: #000;
}

/* MOBILE */
@media (max-width: 768px) {
  .cloud-row img {
    height: 130px;
  }

  .product-card img {
    aspect-ratio: 1 / 1;
  }
}
</style>
</head>

<body>

<header>
  <h1>Vendor Dashboard</h1>
</header>

<!-- CLOUD ICONS -->
<div class="cloud-row">
  <img id="safetyCloud" src="/assets/img/cloud/safety-cloud-logo.jpg">
  <img id="cloudTalk" src="/assets/img/cloud/cloud-talkk-logo.jpg">
</div>

<!-- STATS -->
<div class="center-stats">
  <div class="stat" id="weather">Loading weather…</div>
  <div class="stat" id="beltlineLocation">Locating you…</div>
  <div class="stat" id="timeDisplay"></div>
</div>

<div class="container">

  <a href="/network/staff/pages/products.html" class="add-btn">+ Add New Product</a>

  <div id="productList"></div>

</div>

<script type="module">
import {
  staffGetProducts,
  staffUpdateProduct,
  staffToggleVisibility
} from "/network/staff/js/staff.js";

/* CLOUD ICONS */
document.getElementById("safetyCloud").onclick = () => {
  window.location.href = "/pages/safety/index.html";
};

document.getElementById("cloudTalk").onclick = () => {
  window.location.href = "/pages/chat/pages/index.html";
};

/* TIME */
function updateTime() {
  const now = new Date();
  document.getElementById("timeDisplay").textContent =
    now.toLocaleTimeString("en-US", {
      hour: "numeric",
      minute: "numeric",
      second: "numeric",
      hour12: true,
      timeZone: "America/New_York"
    });
}
setInterval(updateTime, 1000);
updateTime();

/* WEATHER + LOCATION */
async function detectBeltlineLocation() {
  const zones = [
    { name: "Eastside Trail", latMin: 33.745, latMax: 33.760, lngMin: -84.370, lngMax: -84.335 },
    { name: "Westside Trail", latMin: 33.750, latMax: 33.770, lngMin: -84.430, lngMax: -84.400 },
    { name: "Southside Trail", latMin: 33.730, latMax: 33.745, lngMin: -84.395, lngMax: -84.365 },
    { name: "Northside Trail", latMin: 33.780, latMax: 33.800, lngMin: -84.375, lngMax: -84.350 }
  ];

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    /* WEATHER */
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true&temperature_unit=fahrenheit`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      const w = data.current_weather;
      const temp = w.temperature;
      const code = w.weathercode;

      let emoji = "⛅";
      if (code === 0) emoji = "☀️";
      if ([1,2,3].includes(code)) emoji = "🌤️";
      if ([45,48].includes(code)) emoji = "🌫️";
      if ([51,53,55].includes(code)) emoji = "🌦️";
      if ([61,63,65].includes(code)) emoji = "🌧️";
      if ([71,73,75].includes(code)) emoji = "❄️";
      if ([95,96,99].includes(code)) emoji = "⛈️";

      document.getElementById("weather").textContent =
        `${emoji} ${temp}°F`;
    } catch {
      document.getElementById("weather").textContent = "Weather unavailable";
    }

    /* BELTLINE ZONE */
    let zone = "Outside Beltline";
    for (const z of zones) {
      if (lat >= z.latMin && lat <= z.latMax && lng >= z.lngMin && lng <= z.lngMax) {
        zone = z.name;
        break;
      }
    }
    document.getElementById("beltlineLocation").textContent = `📍 ${zone}`;
  }, () => {
    document.getElementById("beltlineLocation").textContent = "Location unavailable";
    document.getElementById("weather").textContent = "Weather unavailable";
  });
}

detectBeltlineLocation();

/* PRODUCTS */
const productList = document.getElementById("productList");

async function loadProducts() {
  const products = await staffGetProducts();
  productList.innerHTML = "";

  products.forEach(p => {
    const card = document.createElement("div");
    card.className = "product-card";

    card.innerHTML = `
      <img src="${p.image || '/assets/img/placeholder.jpg'}">
      <h3>${p.name}</h3>
      <p><strong>Price:</strong> $${p.price}</p>
      <p><strong>Inventory:</strong> ${p.inventory}</p>
      <p><strong>Visible:</strong> ${p.visible ? "Yes" : "No"}</p>
    `;

    const editRow = document.createElement("div");
    editRow.className = "edit-row";

    editRow.innerHTML = `
      <input type="text" id="name-${p.id}" value="${p.name}">
      <input type="number" id="price-${p.id}" value="${p.price}">
    `;

    const actions = document.createElement("div");
    actions.className = "edit-actions";

    actions.innerHTML = `
      <button onclick="saveProduct('${p.id}')">Save</button>
      <button onclick="window.location.href='/network/staff/pages/products.html'">Advanced Edit</button>
    `;

    const visibilityBtn = document.createElement("button");
    visibilityBtn.className = "visibility-toggle";
    visibilityBtn.innerText = p.visible ? "Hide Product" : "Show Product";
    visibilityBtn.onclick = () => toggleVisibility(p.id);

    card.appendChild(editRow);
    card.appendChild(actions);
    card.appendChild(visibilityBtn);

    productList.appendChild(card);
  });
}

window.saveProduct = async (id) => {
  const name = document.getElementById(`name-${id}`).value;
  const price = document.getElementById(`price-${id}`).value;

  await staffUpdateProduct(id, { name, price });
  loadProducts();
};

window.toggleVisibility = async (id) => {
  await staffToggleVisibility(id);
  loadProducts();
};

loadProducts();
</script>

</body>
</html>
