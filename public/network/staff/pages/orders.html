<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orders — Staff</title>
  <link rel="icon" type="image/jpeg" href="/network/public/img/network-logo.jpg">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('/network/public/img/network-back.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
      color: white;
      overflow-x: hidden;
    }

    .lightning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255,255,0,0.25) 0%, transparent 70%);
      opacity: 0;
      animation: lightningFlash 6s infinite;
    }

    @keyframes lightningFlash {
      0%, 93%, 100% { opacity: 0; }
      94% { opacity: 0.9; }
      95% { opacity: 0.2; }
      96% { opacity: 0.8; }
    }

    header {
      text-align: center;
      padding: 30px 20px;
      background: rgba(0,0,0,0.65);
      border-bottom: 2px solid gold;
      box-shadow: 0 0 25px rgba(0,150,255,0.7);
    }

    header img {
      width: 140px;
      filter: drop-shadow(0 0 12px rgba(0,150,255,0.9));
    }

    header h1 {
      margin: 10px 0 0;
      font-size: 34px;
      color: gold;
      text-shadow: 0 0 12px rgba(0,150,255,1);
    }

    .top-bar {
      width: 92%;
      max-width: 900px;
      margin: 20px auto 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .top-bar select,
    .top-bar input {
      padding: 8px 10px;
      border-radius: 8px;
      border: 2px solid gold;
      background: rgba(0,0,0,0.7);
      color: gold;
      min-width: 140px;
    }

    .top-bar button {
      padding: 8px 14px;
      border-radius: 8px;
      border: 2px solid gold;
      background: rgba(0,0,0,0.8);
      color: gold;
      cursor: pointer;
      transition: 0.25s;
    }

    .top-bar button:hover {
      background: gold;
      color: black;
      box-shadow: 0 0 20px rgba(0,150,255,1);
    }

    .container {
      width: 92%;
      max-width: 900px;
      margin: 20px auto 30px;
      background: rgba(0,0,0,0.55);
      border: 2px solid gold;
      border-radius: 14px;
      padding: 20px;
    }

    .container h2 {
      margin: 0 0 10px;
      color: gold;
      text-shadow: 0 0 8px rgba(0,150,255,0.8);
    }

    .order {
      background: rgba(0,0,0,0.7);
      border: 1px solid gold;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .order h3 {
      margin: 0;
      color: gold;
    }

    .order-status {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid gold;
      font-size: 12px;
    }

    .order p {
      margin: 4px 0;
      color: #d4e8ff;
      font-size: 14px;
    }

    .order-actions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .order-actions button {
      padding: 7px 12px;
      border-radius: 8px;
      border: 2px solid gold;
      background: rgba(0,0,0,0.7);
      color: gold;
      cursor: pointer;
      transition: 0.25s;
      font-size: 13px;
    }

    .order-actions button:hover {
      background: gold;
      color: black;
      box-shadow: 0 0 20px rgba(0,150,255,1);
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 28px;
      }
      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>

<div class="lightning"></div>

<header>
  <img src="/network/public/img/network-logo.jpg" alt="Logo">
  <h1>Orders</h1>
</header>

<div class="top-bar">
  <select id="statusFilter">
    <option value="">All Statuses</option>
    <option value="pending">Pending</option>
    <option value="assigned">Assigned</option>
    <option value="enroute">En Route</option>
    <option value="delivered">Delivered</option>
    <option value="cancelled">Cancelled</option>
  </select>

  <input id="searchInput" type="text" placeholder="Search by customer, order ID, or vendor">

  <button id="refreshBtn">Refresh Orders</button>
</div>

<section class="container">
  <h2>Active Orders</h2>
  <div id="orders-list">
    <!-- Filled by staff.js -->
  </div>
</section>

<script src="../js/staff.js"></script>
<script>
  // Initial load
  Staff.loadOrders();

  // Refresh button
  document.getElementById('refreshBtn').onclick = () => {
    Staff.loadOrders();
  };

  // Filter + search hooks (staff.js should read these if you wire it)
  document.getElementById('statusFilter').onchange = () => {
    Staff.loadOrders();
  };

  document.getElementById('searchInput').oninput = () => {
    Staff.loadOrders();
  };
</script>
</body>
</html>
