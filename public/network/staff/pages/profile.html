<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile — Staff</title>
    <link rel="icon" type="image/jpeg" href="/network/public/img/network-logo.jpg">
    <style>
        body { margin:0; padding:0; background:url('/network/public/img/network-back.jpg') no-repeat center center fixed;
               background-size:cover; font-family:Arial,sans-serif; color:white; overflow-x:hidden; }
        .lightning { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none;
                     background:radial-gradient(circle, rgba(255,255,0,0.25) 0%, transparent 70%);
                     opacity:0; animation:lightningFlash 6s infinite; }
        @keyframes lightningFlash { 0%,93%,100%{opacity:0;} 94%{opacity:0.9;} 95%{opacity:0.2;} 96%{opacity:0.8;} }
        header { text-align:center; padding:40px 20px; background:rgba(0,0,0,0.55);
                 border-bottom:2px solid gold; box-shadow:0 0 25px rgba(0,150,255,0.7); }
        header img { width:140px; filter:drop-shadow(0 0 12px rgba(0,150,255,0.9)); }
        header h1 { margin:0; font-size:36px; color:gold; text-shadow:0 0 12px rgba(0,150,255,1); }
        .container { width:92%; max-width:900px; margin:30px auto; background:rgba(0,0,0,0.55);
                     border:2px solid gold; border-radius:14px; padding:20px; }
        label { display:block; margin-top:12px; color:gold; }
        input, textarea { width:100%; padding:10px; margin-top:6px; border-radius:8px;
                          border:1px solid gold; background:rgba(0,0,0,0.7); color:white; }
        .types { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
        .types label { display:flex; align-items:center; gap:6px; color:#d4e8ff; }
        button { margin-top:20px; padding:12px 20px; border-radius:10px; border:2px solid gold;
                 background:rgba(0,0,0,0.7); color:gold; cursor:pointer; transition:0.25s; }
        button:hover { background:gold; color:black; box-shadow:0 0 20px rgba(0,150,255,1); }
    </style>
</head>
<body>

<div class="lightning"></div>

<header>
    <img src="/network/public/img/network-logo.jpg" alt="Logo">
    <h1>My Vendor Profile</h1>
</header>

<section class="container">
    <label>Vendor Name</label>
    <input id="vendor-name">

    <label>Photo URL</label>
    <input id="vendor-photo">

    <label>Short Bio</label>
    <textarea id="vendor-bio"></textarea>

    <label>Vendor Types</label>
    <div class="types">
        <label><input type="checkbox" id="type-product"> Products</label>
        <label><input type="checkbox" id="type-service"> Services</label>
        <label><input type="checkbox" id="type-workshop"> Workshops</label>
        <label><input type="checkbox" id="type-creator"> Creator / Artist</label>
    </div>

    <label>Tags (comma separated: jewelry, haircuts, keys, art, etc.)</label>
    <input id="vendor-tags">

    <button onclick="Staff.saveProfile()">Save Profile</button>
</section>

<script src="../js/staff.js"></script>
<script>
    Staff.loadProfile();
</script>
</body>
</html>
