<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Sign Up — The Network</title>

    <link rel="icon" type="image/jpeg" href="/network/public/img/network-logo.jpg">
    <link rel="stylesheet" href="/network/public/css/style.css">

    <meta property="og:title" content="Staff Sign Up — The Network">
    <meta property="og:description" content="Create your vendor, service, or workshop account on The Network.">
    <meta property="og:image" content="/network/public/img/network-logo.jpg">

    <style>
        /* CINEMATIC INPUT STYLING */
        .panel label {
            font-family: Inter, sans-serif;
            font-size: 16px;
            color: gold;
            margin-top: 15px;
            display: block;
            text-shadow: 0 0 6px rgba(255,255,255,0.3);
        }

        .panel input[type="text"],
        .panel input[type="email"],
        .panel input[type="password"],
        .panel input[type="file"],
        .panel select {
            width: 100%;
            padding: 12px 14px;
            margin-top: 6px;
            background: rgba(0,0,0,0.65);
            border: 2px solid gold;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-family: Inter, sans-serif;
            outline: none;
            transition: 0.25s;
        }

        .panel input:focus,
        .panel select:focus {
            border-color: #00c3ff;
            box-shadow: 0 0 12px rgba(0,200,255,0.7);
        }

        /* CHECKBOX */
        .panel input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: gold;
            cursor: pointer;
        }

        /* BUTTON */
        .panel-link {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            background: gold;
            color: black;
            font-family: Cinzel, serif;
            font-size: 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
        }

        .panel-link:hover {
            background: #00c3ff;
            color: black;
            box-shadow: 0 0 18px rgba(0,200,255,0.9);
        }

        /* PANEL CONTAINER */
        .panel {
            background: rgba(0,0,0,0.55);
            padding: 25px;
            border-radius: 16px;
            border: 2px solid gold;
            box-shadow: 0 0 25px rgba(0,150,255,0.5);
            max-width: 500px;
            margin: auto;
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .panel {
                padding: 20px;
            }
            .panel-link {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

<div class="lightning-overlay"></div>

<header class="network-header">
    <img src="/network/public/img/network-logo.jpg" class="network-logo">
    <h1 class="network-title">Join The Network Staff</h1>
    <p class="network-subtitle">Create your vendor, service, or workshop account.</p>
</header>

<section class="network-panels">
    <div class="panel" style="display:block;">

        <h2>Sign Up</h2>

        <label>Name</label>
        <input id="su-name" type="text">

        <label>Email</label>
        <input id="su-email" type="email">

        <label>Password</label>
        <input id="su-password" type="password">

        <label>Vendor Type</label>
        <select id="su-type">
            <option value="product">Product Vendor</option>
            <option value="service">Service Provider</option>
            <option value="workshop">Workshop Host</option>
            <option value="hybrid">Hybrid (Multiple)</option>
        </select>

        <label>Tags (haircuts, keys, jewelry, art, etc.)</label>
        <input id="su-tags" type="text">

        <label>PayPal Email (for payouts)</label>
        <input id="su-paypal" type="email">

        <label>Active on The Network?</label>
        <input id="su-active" type="checkbox" checked> <span style="color:white;">Show my profile</span>

        <label>Profile Photo</label>
        <input id="su-photo" type="file" accept="image/*">

        <button class="panel-link" onclick="Auth.handleSignup()">Create Account</button>

    </div>
</section>

<script src="/network/public/js/auth.js"></script>
</body>
</html>
