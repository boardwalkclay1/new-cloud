<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Login — The Network</title>

    <link rel="icon" type="image/jpeg" href="/network/public/img/network-logo.jpg">

    <link rel="stylesheet" href="/network/staff/css/style.css">

    <meta property="og:title" content="Staff Login — The Network">
    <meta property="og:description" content="Access your staff dashboard.">
    <meta property="og:image" content="/network/public/img/network-logo.jpg">
</head>

<body>

    <div class="staff-lightning"></div>

    <header class="staff-header">
        <img src="/network/public/img/network-logo.jpg" class="staff-logo">
        <h1 class="staff-title">Staff Login</h1>
        <p class="staff-subtitle">Access your dashboard and manage your presence.</p>
    </header>

    <section class="staff-panel">
        <h2>Login</h2>

        <label>Email</label>
        <input id="li-email" class="staff-input" type="email" placeholder="you@example.com">

        <label>Password</label>
        <input id="li-password" class="staff-input" type="password" placeholder="••••••••">

        <button class="staff-btn" onclick="StaffLogin.handle()">Login</button>
    </section>

    <script>
    const StaffLogin = {

        async handle() {
            const email = document.getElementById("li-email").value.trim();
            const password = document.getElementById("li-password").value.trim();

            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            /* ---------------------------------------------------------
               1. STAFF LOGIN (work-network.js → /api/staff/login)
            --------------------------------------------------------- */
            const res = await fetch("https://api.beltlinecloud.com/api/staff/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!data.success) {
                alert("Invalid staff login.");
                return;
            }

            const staff = data.staff;

            /* ---------------------------------------------------------
               2. CHECK IF CLOUD USER IS A RIDER
               (Only riders can access staff dashboard)
            --------------------------------------------------------- */
            const cloudRaw = localStorage.getItem("beltline_user");

            if (!cloudRaw) {
                alert("You must be logged into your Cloud account.");
                window.location.href = "/pages/profile/login.html";
                return;
            }

            const cloudUser = JSON.parse(cloudRaw);

            // Cloud user must have rider role
            if (!cloudUser.roles || !cloudUser.roles.includes("rider")) {
                alert("Only official Riders can access the staff dashboard.");
                return;
            }

            /* ---------------------------------------------------------
               3. REDIRECT TO STAFF DASHBOARD
            --------------------------------------------------------- */
            window.location.href =
                `/network/staff/dashboard.html?staffId=${encodeURIComponent(staff.id)}`;
        }
    };
    </script>

</body>
</html>
