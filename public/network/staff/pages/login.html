<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vendor Login — The Network</title>

    <link rel="icon" type="image/jpeg" href="/network/public/img/network-logo.jpg">

    <link rel="stylesheet" href="/network/staff/css/style.css">

    <meta property="og:title" content="Vendor Login — The Network">
    <meta property="og:description" content="Access your vendor dashboard.">
    <meta property="og:image" content="/network/public/img/network-logo.jpg">
</head>

<body>

    <div class="staff-lightning"></div>

    <header class="staff-header">
        <img src="/network/public/img/network-logo.jpg" class="staff-logo">
        <h1 class="staff-title">Vendor Login</h1>
        <p class="staff-subtitle">Access your dashboard and manage your presence.</p>
    </header>

    <section class="staff-panel">
        <h2>Login</h2>

        <label>Email</label>
        <input id="vendor-email" class="staff-input" type="email" placeholder="you@example.com">

        <label>Password</label>
        <input id="vendor-password" class="staff-input" type="password" placeholder="••••••••">

        <button class="staff-btn" onclick="Auth.loginVendorUI()">Login</button>
    </section>

    <!-- GLOBAL AUTH ENGINE -->
    <script src="/js/auth.js"></script>

    <script>
        // UI wrapper that calls Auth.js
        const Auth = window.Auth || {};

        Auth.loginVendorUI = async function () {
            const email = document.getElementById("vendor-email").value.trim();
            const password = document.getElementById("vendor-password").value.trim();

            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            // Call the vendor login function inside auth.js
            Auth.loginVendor(email, password);
        };
    </script>

</body>
</html>
