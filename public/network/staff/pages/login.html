<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Response Unit Login — The Network</title>

    <link rel="icon" type="image/jpeg" href="/network/public/img/network-logo.jpg">

    <link rel="stylesheet" href="/network/staff/css/style.css">

    <meta property="og:title" content="Response Unit Login — The Network">
    <meta property="og:description" content="Access your response dashboard.">
    <meta property="og:image" content="/network/public/img/network-logo.jpg">
</head>

<body>

    <div class="staff-lightning"></div>

    <header class="staff-header">
        <img src="/network/public/img/network-logo.jpg" class="staff-logo">
        <h1 class="staff-title">Response Unit Login</h1>
        <p class="staff-subtitle">Access your emergency response dashboard.</p>
    </header>

    <section class="staff-panel">
        <h2>Login</h2>

        <label>Email</label>
        <input id="li-email" class="staff-input" type="email" placeholder="you@example.com">

        <label>Password</label>
        <input id="li-password" class="staff-input" type="password" placeholder="••••••••">

        <button class="staff-btn" onclick="ResponseLogin.handle()">Login</button>
    </section>

    <script>
    const ResponseLogin = {

        async handle() {
            const email = document.getElementById("li-email").value.trim();
            const password = document.getElementById("li-password").value.trim();

            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            /* ---------------------------------------------------------
               1. RESPONSE UNIT LOGIN (network-api.js → /api/response/login)
            --------------------------------------------------------- */
            const res = await fetch("https://api.beltlinecloud.com/api/response/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!data.success) {
                alert("Invalid Response Unit login.");
                return;
            }

            const responseMember = data.member;

            /* ---------------------------------------------------------
               2. CHECK CLOUD USER SESSION
            --------------------------------------------------------- */
            const cloudRaw = localStorage.getItem("beltline_user");

            if (!cloudRaw) {
                alert("You must be logged into your Cloud account.");
                window.location.href = "/pages/profile/login.html";
                return;
            }

            const cloudUser = JSON.parse(cloudRaw);

            /* ---------------------------------------------------------
               3. CHECK RESPONSE UNIT ROLE
            --------------------------------------------------------- */
            if (!cloudUser.roles || !cloudUser.roles.includes("response_unit")) {
                alert("You are not registered as a Response Unit member.");
                return;
            }

            /* ---------------------------------------------------------
               4. REDIRECT TO RESPONSE UNIT DASHBOARD
            --------------------------------------------------------- */
            window.location.href =
                `/public/pages/safety/response-unit/pages/response-dash.html?memberId=${encodeURIComponent(responseMember.id)}`;
        }
    };
    </script>

</body>
</html>
