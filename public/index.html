<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beltline Cloud Inc</title>

  <link rel="icon" type="image/png" href="/assets/img/cloud/cloud-logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-image: url('/assets/img/cloud/cloud-index.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    #cloudBar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px 20px;
      background: rgba(0,0,0,0.65);
      color: #ffd700;
      font-family: 'Cinzel', serif;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(6px);
    }

    .nav {
      margin-top: 50px;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
    }

    .logo img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      cursor: pointer;
    }

    .nav-links a {
      margin-left: 18px;
      color: #ffd700;
      text-decoration: none;
      font-size: 1rem;
      font-family: 'Cinzel', serif;
    }

    #logoMenu {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      padding: 40px;
      z-index: 99999;
    }
    #logoMenu a {
      display: block;
      margin: 14px 0;
      font-size: 1.3rem;
      color: #ffd700;
      text-decoration: none;
      font-family: 'Cinzel', serif;
    }
    #closeMenu {
      font-size: 2rem;
      color: #ffd700;
      cursor: pointer;
      margin-bottom: 20px;
      font-family: 'Cinzel', serif;
    }

    .welcome-cloud {
      max-width: 900px;
      margin: 140px auto 40px;
      padding: 30px;
      background: rgba(0,0,0,0.65);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      text-align: center;
      animation: glowPulse 4s infinite ease-in-out;
    }

    .welcome-cloud h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.6rem;
      margin-bottom: 14px;
      color: #ffd700;
      text-shadow: 0 0 12px #ffd700;
    }

    .welcome-cloud p {
      font-size: 1.1rem;
      line-height: 1.7;
      opacity: 0.92;
      font-family: 'Cinzel', serif;
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 20px rgba(255,215,0,0.25); }
      50% { box-shadow: 0 0 40px rgba(255,215,0,0.45); }
      100% { box-shadow: 0 0 20px rgba(255,215,0,0.25); }
    }

    .hero {
      text-align: center;
      padding: 60px 20px 40px;
      background: rgba(0,0,0,0.55);
      max-width: 900px;
      margin: 0 auto;
      border-radius: 20px;
    }

    /* Replace text with logo */
    .hero img {
      width: 220px;
      height: 220px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.15rem;
      opacity: 0.85;
      max-width: 700px;
      margin: 0 auto;
      font-family: 'Cinzel', serif;
    }

    .logo-strip {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 20px;
      margin-bottom: 40px;
    }
    .logo-strip img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      cursor: pointer;
      transition: 0.25s ease;
    }
    .logo-strip img:hover {
      transform: translateY(-4px);
      filter: drop-shadow(0 0 12px #ffd700);
    }

    .video-section {
      max-width: 1100px;
      margin: 40px auto;
      background: rgba(0,0,0,0.55);
      padding: 20px;
      border-radius: 14px;
    }
    .video-section iframe {
      width: 100%;
      height: 620px;
      border: none;
    }

    .radar-link {
      text-align: center;
      margin-top: 20px;
    }
    .radar-link a {
      color: #ffd700;
      font-size: 1.2rem;
      text-decoration: none;
      background: rgba(0,0,0,0.55);
      padding: 10px 20px;
      border-radius: 12px;
      font-family: 'Cinzel', serif;
    }

    .dropdowns {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: rgba(0,0,0,0.65);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.18);
    }
    .dropdown {
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding: 14px 0;
      cursor: pointer;
    }
    .dropdown h3 {
      font-size: 1.3rem;
      font-family: 'Cinzel', serif;
      color: #ffd700;
    }
    .dropdown-content {
      display: none;
      padding: 12px 0;
      font-family: 'Cinzel', serif;
      line-height: 1.6;
    }
    .dropdown.open .dropdown-content {
      display: block;
    }

    .feed-section {
      max-width: 1100px;
      margin: 60px auto;
      padding: 20px;
      background: rgba(0,0,0,0.55);
      border-radius: 20px;
    }
    .feed-title {
      font-size: 1.6rem;
      font-family: 'Cinzel', serif;
      color: #ffd700;
    }
    .scroll-feed {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 10px 0;
    }
    .feed-card {
      min-width: 240px;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      font-family: 'Cinzel', serif;
    }

    .footer {
      text-align: center;
      padding: 40px;
      font-family: 'Cinzel', serif;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div id="cloudBar">
  <span id="timeDisplay">Loading time…</span>
  <span id="weatherDisplay">Loading weather…</span>
</div>

  </div>

    <a href="/pages/signup.html">Join Cloud</a>
  </div>
</nav>
