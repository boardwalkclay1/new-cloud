<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin — Boardwalk Beltline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#05060a; color:#f5f5f5; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; padding:20px; }
    h1 { margin-bottom:10px; }
    table { width:100%; border-collapse: collapse; margin-bottom:30px; }
    th, td { border:1px solid #333; padding:8px; font-size:0.9rem; }
    th { background:#111; }
    button { padding:6px 10px; border-radius:6px; border:none; cursor:pointer; }
  </style>
</head>
<body>
  <h1>Admin Dashboard</h1>
  <p>Bookings & payouts overview.</p>

  <h2>Bookings</h2>
  <table id="bookingsTable">
    <thead>
      <tr>
        <th>Created</th>
        <th>Name</th>
        <th>Email</th>
        <th>Discipline</th>
        <th>Instructor</th>
        <th>Date</th>
        <th>Time</th>
        <th>Price</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Payouts</h2>
  <table id="payoutsTable">
    <thead>
      <tr>
        <th>Created</th>
        <th>Staff</th>
        <th>Booking</th>
        <th>Amount</th>
        <th>Status</th>
        <th>Paid At</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const adminToken = window.prompt("Admin token:");
    if (!adminToken) {
      document.body.innerHTML = "<p>Unauthorized.</p>";
    } else {
      loadData();
    }

    async function loadData() {
      await Promise.all([loadBookings(), loadPayouts()]);
    }

    async function loadBookings() {
      const res = await fetch('/api/admin/bookings', {
        headers: { 'x-admin-token': adminToken }
      });
      if (!res.ok) {
        document.body.innerHTML = "<p>Unauthorized.</p>";
        return;
      }
      const data = await res.json();
      const tbody = document.querySelector('#bookingsTable tbody');
      tbody.innerHTML = '';
      data.forEach(b => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${b.createdAt || ''}</td>
          <td>${b.userName}</td>
          <td>${b.userEmail}</td>
          <td>${b.discipline}</td>
          <td>${b.instructorType}</td>
          <td>${b.date}</td>
          <td>${b.time}</td>
          <td>$${b.price}</td>
          <td>${b.paymentStatus}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function loadPayouts() {
      const res = await fetch('/api/admin/payouts', {
        headers: { 'x-admin-token': adminToken }
      });
      if (!res.ok) return;
      const data = await res.json();
      const tbody = document.querySelector('#payoutsTable tbody');
      tbody.innerHTML = '';
      data.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.createdAt || ''}</td>
          <td>${p.staffId}</td>
          <td>${p.bookingId}</td>
          <td>$${p.amountOwed}</td>
          <td>${p.status}</td>
          <td>${p.paidAt || ''}</td>
          <td>
            ${p.status === 'unpaid'
              ? '<button data-id="'+p.id+'">Mark Paid</button>'
              : ''}
          </td>
        `;
        tbody.appendChild(tr);
      });

      tbody.addEventListener('click', async (e) => {
        if (e.target.tagName === 'BUTTON') {
          const id = e.target.getAttribute('data-id');
          await fetch('/api/admin/payouts/mark-paid', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-admin-token': adminToken
            },
            body: JSON.stringify({ payoutId: id })
          });
          loadPayouts();
        }
      });
    }
  </script>
</body>
</html>
