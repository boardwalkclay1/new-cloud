<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Response Unit Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/pages/response-unit/css/response.css">
</head>

<body data-page="ru-dashboard">

  <!-- Global Nav -->
  <nav class="nav">
    <div class="logo">
      <img src="/assets/img/cloud/cloud-logo.jpg" onclick="location.href='/'">
    </div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/pages/music.html">Cloud Radio</a>
      <a href="/events/index.html">Events</a>
      <a href="/network/public/pages/index.html">Network</a>
      <a href="/pages/safety/index.html">Safety CLOUD</a>
      <a href="/pages/feed/index.html">Feed</a>
      <a href="/pages/profile/index.html">Profile</a>
    </div>
  </nav>

  <!-- Permanent Cloud Chat Icon -->
  <div class="cloud-chat-icon" onclick="location.href='/pages/chat/index.html'">💬</div>

  <h1>Response Unit Command Center</h1>

  <div class="section">
    <button class="cloud-btn" onclick="location.href='/pages/response-unit/signup.html'">
      New Responder Signup
    </button>

    <button class="cloud-btn" onclick="location.href='/pages/response-unit/roster.html'">
      View Full Roster
    </button>

    <button class="cloud-btn" onclick="location.href='/pages/response-unit/incident-center.html'">
      Incident Center
    </button>
  </div>

  <div class="section">
    <h2>Live Alerts</h2>
    <div id="liveAlerts" class="alert-grid"></div>
  </div>

  <script type="module">
    import { getIncidentHistory } from "/pages/profile/js/response-unit.js";

    async function loadLiveAlerts() {
      const alerts = await getIncidentHistory({ status: "open" });
      const container = document.getElementById("liveAlerts");

      container.innerHTML = alerts.map(a => `
        <div class="alert-card">
          <h3>${a.mode.toUpperCase()}</h3>
          <p>Severity: ${a.severity}</p>
          <p>${new Date(a.timestamp).toLocaleString()}</p>
          <button onclick="location.href='/pages/response-unit/incident-center.html?id=${a.id}'">
            Open Incident
          </button>
        </div>
      `).join("");
    }

    loadLiveAlerts();
  </script>

</body>
</html>
