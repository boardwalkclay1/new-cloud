<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Response Unit Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="/pages/safety/response-unit/css/response.css">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>

<body data-page="ru-dashboard">

  <!-- NAV -->
  <nav class="nav">
    <div class="logo">
      <img src="/assets/img/cloud/cloud-logo.jpg" onclick="location.href='/'">
    </div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/pages/music.html">Cloud Radio</a>
      <a href="/events/index.html">Events</a>
      <a href="/network/public/pages/index.html">Network</a>
      <a href="/pages/safety/index.html">Safety CLOUD</a>
      <a href="/pages/feed/index.html">Feed</a>
      <a href="/pages/profile/index.html">Profile</a>
    </div>
  </nav>

  <!-- CLOUD CHAT ICON -->
  <div class="cloud-chat-icon" onclick="location.href='/pages/chat/index.html'">💬</div>

  <!-- HEADER -->
  <header class="ru-header">
    <h1>Response Unit Command Center</h1>
    <p>Real‑time operations for Medical, Enforcement, and Community responders.</p>
  </header>

  <!-- MAIN ACTIONS -->
  <section class="section">
    <button class="ru-btn" onclick="location.href='/pages/response-unit/signup.html'">
      New Responder Signup
    </button>

    <button class="ru-btn" onclick="location.href='/pages/response-unit/roster.html'">
      View Full Roster
    </button>

    <button class="ru-btn" onclick="location.href='/pages/response-unit/incident-center.html'">
      Incident Center
    </button>
  </section>

  <!-- LIVE ALERTS -->
  <section class="section">
    <h2>Live Alerts</h2>
    <p style="color:#d4af37; margin-bottom:10px;">Active incidents requiring attention</p>

    <div id="liveAlerts" class="incident-grid"></div>
  </section>

  <!-- JS -->
  <script type="module">
    import { getIncidentHistory } from "/pages/profile/js/response-unit.js";

    async function loadLiveAlerts() {
      const alerts = await getIncidentHistory({ status: "open" });
      const container = document.getElementById("liveAlerts");

      if (!alerts || alerts.length === 0) {
        container.innerHTML = `
          <div class="incident-card">
            <h3>No Active Alerts</h3>
            <p>All clear across the Beltline.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = alerts.map(a => `
        <div class="incident-card">
          <h3>${a.mode.toUpperCase()}</h3>
          <p>Severity: <strong>${a.severity}</strong></p>
          <p>${new Date(a.timestamp).toLocaleString()}</p>

          <button onclick="location.href='/pages/response-unit/incident-center.html?id=${a.id}'">
            Open Incident
          </button>
        </div>
      `).join("");
    }

    loadLiveAlerts();
  </script>

</body>
</html>
