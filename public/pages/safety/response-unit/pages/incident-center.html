<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Incident Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/pages/response-unit/css/response.css">
</head>

<body data-page="ru-incidents">

  <!-- Global Nav -->
  <nav class="nav">
    <div class="logo">
      <img src="/assets/img/cloud/cloud-logo.jpg" onclick="location.href='/'">
    </div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/pages/music.html">Cloud Radio</a>
      <a href="/events/index.html">Events</a>
      <a href="/network/public/pages/index.html">Network</a>
      <a href="/pages/safety/index.html">Safety CLOUD</a>
      <a href="/pages/feed/index.html">Feed</a>
      <a href="/pages/profile/index.html">Profile</a>
    </div>
  </nav>

  <!-- Permanent Cloud Chat Icon -->
  <div class="cloud-chat-icon" onclick="location.href='/pages/chat/index.html'">💬</div>

  <h1>Incident Center</h1>

  <div id="incidentList" class="incident-grid"></div>

  <script type="module">
    import { getIncidentHistory } from "/pages/profile/js/response-unit.js";

    async function loadIncidents() {
      const incidents = await getIncidentHistory({});
      const container = document.getElementById("incidentList");

      container.innerHTML = incidents.map(i => `
        <div class="incident-card">
          <h3>${i.mode.toUpperCase()}</h3>
          <p>Severity: ${i.severity}</p>
          <p>${new Date(i.timestamp).toLocaleString()}</p>
          <button onclick="location.href='/pages/chat/index.html?incident=${i.id}'">
            Open Response Chat
          </button>
        </div>
      `).join("");
    }

    loadIncidents();
  </script>

</body>
</html>
