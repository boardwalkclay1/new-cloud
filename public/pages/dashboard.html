<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Workshops — Boardwalk Beltline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <section class="page-content">
    <h1>My Workshops</h1>
    <p>Enter your email to see your bookings.</p>
    <input id="email" type="email" placeholder="you@example.com" style="padding:10px; width:260px;">
    <button class="btn" id="loadBtn">Load</button>
    <div id="results" style="margin-top:20px;"></div>
  </section>

  <script>
    document.getElementById('loadBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const res = await fetch('/api/user/bookings?email=' + encodeURIComponent(email));
      const data = await res.json();
      const box = document.getElementById('results');
      if (!data.length) {
        box.innerHTML = "<p>No bookings found.</p>";
        return;
      }
      box.innerHTML = data.map(b => `
        <div class="card" style="margin-bottom:10px;">
          <strong>${b.discipline}</strong> with ${b.instructorType} — ${b.date} ${b.time}<br>
          Status: ${b.paymentStatus} — $${b.price}
        </div>
      `).join('');
    });
  </script>
</body>
</html>
