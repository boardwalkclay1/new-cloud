<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Beltline Cloud Map</title>

    <!-- CLOUD MAP CSS -->
    <link rel="stylesheet" href="/css/cloud-map.css">
</head>

<body>

    <!-- BACKGROUND IMAGE -->
    <div class="cloud-map-bg"></div>

    <!-- MAP CONTAINER (CANVAS INSERTED BY JS) -->
    <div id="cloudMap"></div>

    <!-- TOOLBELT -->
    <div class="cloud-map-tools">
        <button class="tool-btn" data-zoom="full">Full Beltline</button>
        <button class="tool-btn" data-zoom="east">Eastside</button>
        <button class="tool-btn" data-zoom="west">Westside</button>
        <button class="tool-btn" data-zoom="north">Northside</button>
        <button class="tool-btn" data-zoom="south">Southside</button>
    </div>

    <!-- CUSTOM MAP ENGINE -->
    <script src="/js/cloud-map.js"></script>

</body>
</html>
