<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Beltline Cloud Map</title>

    <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="/pages/cloud-map/cloud-map.css">
</head>

<body>

    <!-- BACKGROUND IMAGE (FORCED, DIRECT CALL) -->
    <div class="cloud-map-bg" style="background-image: url('/assets/img/cloud/cloud-map.jpg');"></div>

    <!-- MAP CONTAINER -->
    <div id="cloudMap"></div>

    <!-- TOOLBELT -->
    <div class="cloud-map-tools">
        <button class="tool-btn" data-zoom="full">Full Beltline</button>
        <button class="tool-btn" data-zoom="east">Eastside</button>
        <button class="tool-btn" data-zoom="west">Westside</button>
        <button class="tool-btn" data-zoom="north">Northside</button>
        <button class="tool-btn" data-zoom="south">Southside</button>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
    <script type="module" src="/pages/cloud-map/cloud-map.js"></script>

</body>
</html>
