<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Beltline Cloud Map</title>

    <link rel="icon" type="image/png" href="/public/assets/img/favicon.png">

    <!-- MAPLIBRE -->
    <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet">

    <!-- CLOUD MAP CSS -->
    <link rel="stylesheet" href="/public/pages/cloud-map/cloud-map.css">
</head>

<body>

    <!-- BACKGROUND IMAGE -->
    <div class="cloud-map-bg"></div>

    <!-- TOP NAV -->
    <nav class="cloud-map-nav">
        <div class="cloud-map-logo"></div>

        <ul class="cloud-map-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/pages/community.html">Community</a></li>
            <li><a href="/pages/cumulus.html">Cumulus Cloud</a></li>
            <li><a href="/pages/map.html" class="active">Cloud Map</a></li>
            <li><a href="/pages/messages/index.html">Messages</a></li>
        </ul>
    </nav>

    <!-- MAP CONTAINER -->
    <div id="cloudMap"></div>

    <!-- TOOLBELT -->
    <div class="cloud-map-tools">
        <button class="tool-btn" data-zoom="full">Full Beltline</button>
        <button class="tool-btn" data-zoom="east">Eastside</button>
        <button class="tool-btn" data-zoom="west">Westside</button>
        <button class="tool-btn" data-zoom="north">Northside</button>
        <button class="tool-btn" data-zoom="south">Southside</button>

        <button class="tool-btn" data-layer="vendors">Vendors</button>
        <button class="tool-btn" data-layer="parks">Parks</button>
        <button class="tool-btn" data-layer="water">Water</button>
        <button class="tool-btn" data-layer="cloudFamily">Cloud Family</button>
        <button class="tool-btn" data-layer="response">Response</button>
    </div>

    <!-- MAP JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
    <script type="module" src="/public/pages/cloud-map/cloud-map.js"></script>

</body>
</html>
