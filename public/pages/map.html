<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Beltline Cloud Map</title>

    <!-- MAPTILER SDK -->
    <link rel="stylesheet" href="https://cdn.maptiler.com/maptiler-sdk-js/v1.3.0/maptiler-sdk.css">
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v1.3.0/maptiler-sdk.umd.js"></script>

    <!-- YOUR CSS -->
    <link rel="stylesheet" href="/public/pages/cloud-map/cloud-map.css">
</head>

<body>

    <!-- BACKGROUND IMAGE (FORCED) -->
    <div class="cloud-map-bg" style="background-image: url('/assets/img/cloud/cloud-map.jpg');"></div>

    <!-- MAP -->
    <div id="cloudMap"></div>

    <!-- TOOLBELT -->
    <div class="cloud-map-tools">
        <button class="tool-btn" data-zoom="full">Full Beltline</button>
        <button class="tool-btn" data-zoom="east">Eastside</button>
        <button class="tool-btn" data-zoom="west">Westside</button>
        <button class="tool-btn" data-zoom="north">Northside</button>
        <button class="tool-btn" data-zoom="south">Southside</button>
    </div>

    <!-- YOUR JS -->
    <script src="/public/pages/cloud-map/cloud-map.js"></script>

</body>
</html>
