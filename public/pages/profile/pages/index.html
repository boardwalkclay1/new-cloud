<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cloud Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="/pages/profile/css/profile.css">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="/assets/img/cloud/cloud-logo.jpg">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body data-page="profile-dashboard">

  <!-- Permanent Cloud Chat Icon -->
  <div class="cloud-chat-icon" onclick="location.href='/pages/chat/index.html'">
    💬
  </div>

  <!-- SIMPLE NAV (TOP RIGHT MESSAGE ICON) -->
  <div class="profile-top-bar">
    <div class="profile-top-right">
      <img src="/assets/img/cloud/cloud-talkk-logo.jpg"
           class="profile-messages-icon"
           alt="Messages"
           onclick="location.href='/pages/messages/messages.html'">
    </div>
  </div>

  <!-- Banner -->
  <div id="profileBanner" class="profile-banner"></div>

  <!-- Avatar -->
  <img id="profileAvatar" class="profile-avatar" alt="Profile Avatar">

  <!-- Name + Tags + Social + Rep -->
  <div class="profile-header-row">
    <div class="profile-main-block">
      <!-- Name -->
      <h1 id="profileName" class="profile-name"></h1>

      <!-- Identity Tags -->
      <div id="profileTags" class="profile-tags"></div>

      <!-- Social Links (only show if user adds link) -->
      <div class="profile-social-row">
        <a id="socialInstagram" class="profile-social-link" target="_blank" rel="noopener">Instagram</a>
        <a id="socialTikTok" class="profile-social-link" target="_blank" rel="noopener">TikTok</a>
        <a id="socialFacebook" class="profile-social-link" target="_blank" rel="noopener">Facebook</a>
      </div>
    </div>

    <!-- Rep Points -->
    <div class="profile-rep-block">
      <span class="rep-label">Rep Points</span>
      <span id="repValue" class="rep-value">0</span>
    </div>
  </div>

  <!-- Safety CLOUD Status -->
  <div class="status-section">
    <h3>Safety CLOUD Status</h3>
    <img id="safetyCloudStatusBadge" class="status-badge" alt="Safety Cloud Badge">
  </div>

  <!-- Badges Preview (space only, JS will fill) -->
  <div class="section">
    <h2>Your Badges</h2>
    <div id="profileBadgePreview" class="badge-preview-row"></div>
    <button class="cloud-btn" onclick="location.href='/pages/profile/badges.html'">
      View All Badges
    </button>
  </div>

  <!-- Photos Section -->
  <div class="section">
    <h2>Your Photos</h2>

    <!-- Grid that JS will fill with user photos -->
    <div id="photoGrid" class="media-grid"></div>

    <!-- Upload from profile -->
    <div class="media-upload-row">
      <input type="file" id="photoUpload" accept="image/*">
      <button class="cloud-btn" id="photoPostBtn">Upload Photo</button>
    </div>
  </div>

  <!-- Videos Section -->
  <div class="section">
    <h2>Your Videos</h2>

    <!-- Grid that JS will fill with user videos -->
    <div id="videoGrid" class="media-grid"></div>

    <!-- Upload from profile -->
    <div class="media-upload-row">
      <input type="file" id="videoUpload" accept="video/*">
      <button class="cloud-btn" id="videoPostBtn">Upload Video</button>
    </div>
  </div>

  <!-- Settings / Edit Profile -->
  <div class="section">
    <button class="cloud-btn" onclick="location.href='/pages/profile/edit.html'">
      Edit Profile
    </button>
  </div>

  <script type="module">
    import { loadUserProfile } from "/pages/profile/js/profile.js";
    window.userId = localStorage.getItem("cloud_user_id");
    loadUserProfile(window.userId);
  </script>

</body>
</html>
