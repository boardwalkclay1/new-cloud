<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cloud Profile — Beltline Cloud</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- BASE PROFILE CSS -->
  <link rel="stylesheet" href="/pages/profile/css/profile.css">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="/assets/img/cloud/cloud-logo.jpg">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: #fff;
      background: #000;
    }

    .page-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #1b1b2f 0%, #000 55%);
      z-index: -1;
    }

    /* NAV */
    nav.nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: rgba(0,0,0,0.85);
      border-bottom: 2px solid #f7d354;
      z-index: 1000;
    }

    #burgerLogo {
      width: 60px;
      height: 60px;
      object-fit: contain;
      cursor: pointer;
    }

    #messagesIcon {
      width: 52px;
      height: 52px;
      object-fit: contain;
      cursor: pointer;
    }

    /* BURGER MENU */
    #burgerMenu {
      position: fixed;
      top: 0;
      left: -100%;
      width: 280px;
      height: 100%;
      background: rgba(0,0,0,0.95);
      border-right: 2px solid #f7d354;
      padding: 24px;
      box-sizing: border-box;
      transition: left 0.3s ease;
      z-index: 1200;
      overflow-y: auto;
    }
    #burgerMenu.open {
      left: 0;
    }
    #burgerMenu .menu-close {
      font-size: 32px;
      color: #f7d354;
      cursor: pointer;
      float: right;
    }
    #burgerMenu h3 {
      font-family: 'Cinzel', serif;
      color: #f7d354;
      margin-top: 28px;
      margin-bottom: 10px;
    }
    #burgerMenu a {
      display: block;
      padding: 8px 0;
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
    }
    #burgerMenu a:hover {
      color: #00b86b;
    }

    /* CLOUD CHAT ICON (PERMANENT) */
    .cloud-chat-icon {
      position: fixed;
      bottom: 18px;
      left: 18px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(0,0,0,0.85);
      border: 2px solid #f7d354;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 900;
      font-size: 22px;
    }

    /* PROFILE SHELL */
    .profile-shell {
      max-width: 960px;
      margin: 80px auto 40px;
      padding: 0 16px 40px;
      box-sizing: border-box;
    }

    /* BANNER */
    .profile-banner {
      width: 100%;
      height: 180px;
      border-radius: 18px;
      background-size: cover;
      background-position: center;
      background-color: #111;
      position: relative;
      box-shadow: 0 0 18px rgba(0,0,0,0.8);
    }

    /* AVATAR */
    .profile-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid #f7d354;
      object-fit: cover;
      position: relative;
      margin-top: -55px;
      margin-left: 18px;
      box-shadow: 0 0 14px rgba(247,211,84,0.7);
      background: #000;
      cursor: pointer;
    }

    /* HEADER ROW */
    .profile-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-top: 12px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .profile-main-block {
      flex: 1;
      min-width: 220px;
    }

    .profile-name {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      margin: 4px 0 6px;
    }

    .profile-cloud-name {
      font-size: 0.95rem;
      color: #ccc;
      margin-bottom: 8px;
    }

    .profile-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .profile-tag-pill {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #f7d354;
      font-size: 0.8rem;
    }

    .profile-social-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .profile-social-link {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.8);
      border: 1px solid #f7d354;
      font-size: 0.8rem;
      text-decoration: none;
      color: #fff;
      display: none; /* shown only if link exists */
    }

    .profile-rep-block {
      min-width: 90px;
      text-align: right;
    }

    .rep-label {
      font-size: 0.8rem;
      color: #ccc;
      display: block;
    }

    .rep-value {
      font-size: 1.4rem;
      color: #f7d354;
      font-family: 'Cinzel', serif;
    }

    /* SAFETY CLOUD */
    .status-section {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #f7d354;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-section h3 {
      margin: 0;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
    }
    .status-badge {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      object-fit: cover;
      background: #111;
    }

    /* BADGE PREVIEW */
    .section {
      margin-top: 22px;
    }
    .section h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      margin-bottom: 10px;
    }
    .badge-preview-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .badge-slot img {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid #f7d354;
      object-fit: cover;
      background: #111;
    }
    .cloud-btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      background: #f7d354;
      color: #000;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* TABS */
    .profile-tabs {
      display: flex;
      gap: 14px;
      margin-top: 24px;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }
    .profile-tab {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.85rem;
      background: rgba(0,0,0,0.7);
      border: 1px solid transparent;
    }
    .profile-tab-icon {
      font-size: 1.1rem;
    }
    .profile-tab.active {
      border-color: #f7d354;
      background: rgba(247,211,84,0.12);
    }

    /* TAB CONTENT */
    .tab-content {
      margin-top: 16px;
    }
    .tab-pane {
      display: none;
    }
    .tab-pane.active {
      display: block;
    }

    /* MEDIA GRID */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
    }
    .media-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #111;
      cursor: pointer;
    }
    .media-img,
    .media-video-thumb {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
    }

    .media-upload-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .media-upload-row input[type="file"] {
      font-size: 0.8rem;
    }

    /* CLOUD CIRCLE LIST */
    .cloud-circle-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .cloud-circle-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #333;
      cursor: pointer;
    }
    .cloud-circle-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      background: #111;
    }
    .cloud-circle-name {
      font-size: 0.85rem;
    }

    /* STORY LIST */
    .cloud-story-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .cloud-story-item {
      width: 90px;
      height: 140px;
      border-radius: 14px;
      background: #111;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .cloud-story-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* FULLSCREEN VIEWER (BASIC SHELL) */
    .media-viewer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1300;
    }
    .media-viewer-overlay.active {
      display: flex;
    }
    .media-viewer-content {
      max-width: 90vw;
      max-height: 90vh;
    }
    .media-viewer-close {
      position: fixed;
      top: 16px;
      right: 16px;
      font-size: 28px;
      color: #f7d354;
      cursor: pointer;
      z-index: 1350;
    }

    @media (max-width: 600px) {
      .profile-header-row {
        flex-direction: column;
        align-items: flex-start;
      }
      .profile-rep-block {
        text-align: left;
      }
      .profile-banner {
        height: 150px;
      }
      .profile-avatar {
        width: 90px;
        height: 90px;
        margin-top: -45px;
      }
      #burgerLogo {
        width: 52px;
        height: 52px;
      }
      #messagesIcon {
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>

<body data-page="profile-dashboard">

  <div class="page-bg"></div>

  <!-- PERMANENT CLOUD CHAT ICON -->
  <div class="cloud-chat-icon" onclick="location.href='/pages/chat/index.html'">
    💬
  </div>

  <!-- BURGER MENU -->
  <div id="burgerMenu">
    <span class="menu-close" id="menuClose">&times;</span>

    <h3>Cloud</h3>
    <a href="/pages/chat/index.html">Cloud Chat</a>
    <a href="/pages/feed/index.html">Cloud Feed</a>
    <a href="/pages/safety/index.html">Safety Cloud</a>
    <a href="/pages/map/beltline-map.html">Beltline Map</a>

    <h3>Profile</h3>
    <a href="/pages/profile/view.html">View Profile</a>
    <a href="/pages/profile/edit.html">Edit Profile</a>
    <a href="/pages/profile/badges.html">Badge Vault</a>

    <h3>Account</h3>
    <a href="/pages/settings.html">Settings</a>
    <a href="/pages/notifications.html">Notifications</a>
    <a href="/pages/login.html">Logout</a>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <img src="/assets/img/cloud/cloud-logo.jpg" id="burgerLogo" alt="Menu">
    <img src="/assets/img/cloud/cloud-talkk-logo.jpg" id="messagesIcon" alt="Messages" onclick="location.href='/pages/messages/messages.html'">
  </nav>

  <!-- PROFILE SHELL -->
  <div class="profile-shell">

    <!-- Banner -->
    <div id="profileBanner" class="profile-banner"></div>

    <!-- Avatar -->
    <img id="profileAvatar" class="profile-avatar" alt="Profile Avatar">

    <!-- Header Row -->
    <div class="profile-header-row">
      <div class="profile-main-block">
        <h1 id="profileName" class="profile-name"></h1>
        <div id="profileCloudName" class="profile-cloud-name"></div>

        <div id="profileTags" class="profile-tags"></div>

        <div class="profile-social-row">
          <a id="socialInstagram" class="profile-social-link" target="_blank" rel="noopener">Instagram</a>
          <a id="socialTikTok" class="profile-social-link" target="_blank" rel="noopener">TikTok</a>
          <a id="socialFacebook" class="profile-social-link" target="_blank" rel="noopener">Facebook</a>
        </div>
      </div>

      <div class="profile-rep-block">
        <span class="rep-label">Rep Points</span>
        <span id="repValue" class="rep-value">0</span>
      </div>
    </div>

    <!-- Safety CLOUD Status -->
    <div class="status-section">
      <h3>Safety CLOUD Status</h3>
      <img id="safetyCloudStatusBadge" class="status-badge" alt="Safety Cloud Badge">
    </div>

    <!-- Badges Preview -->
    <div class="section">
      <h2>Your Badges</h2>
      <div id="profileBadgePreview" class="badge-preview-row"></div>
      <button class="cloud-btn" onclick="location.href='/pages/profile/badges.html'">
        View All Badges
      </button>
    </div>

    <!-- TABS -->
    <div class="profile-tabs">
      <div class="profile-tab active" data-tab="photos">
        <span class="profile-tab-icon">🖼</span>
        <span>Photos</span>
      </div>
      <div class="profile-tab" data-tab="videos">
        <span class="profile-tab-icon">🎥</span>
        <span>Videos</span>
      </div>
      <div class="profile-tab" data-tab="circle">
        <span class="profile-tab-icon">☁️</span>
        <span>Cloud Circle</span>
      </div>
      <div class="profile-tab" data-tab="story">
        <span class="profile-tab-icon">🌙</span>
        <span>Cloud Story</span>
      </div>
    </div>

    <!-- TAB CONTENT -->
    <div class="tab-content">

      <!-- PHOTOS TAB -->
      <div id="tab-photos" class="tab-pane active">
        <div id="photoGrid" class="media-grid"></div>

        <div class="media-upload-row">
          <input type="file" id="photoUpload" accept="image/*">
          <button class="cloud-btn" id="photoPostBtn">Upload Photo</button>
        </div>
      </div>

      <!-- VIDEOS TAB -->
      <div id="tab-videos" class="tab-pane">
        <div id="videoGrid" class="media-grid"></div>

        <div class="media-upload-row">
          <input type="file" id="videoUpload" accept="video/*">
          <button class="cloud-btn" id="videoPostBtn">Upload Video</button>
        </div>
      </div>

      <!-- CLOUD CIRCLE TAB -->
      <div id="tab-circle" class="tab-pane">
        <div id="cloudCircleList" class="cloud-circle-list"></div>
      </div>

      <!-- CLOUD STORY TAB -->
      <div id="tab-story" class="tab-pane">
        <div id="cloudStoryList" class="cloud-story-list"></div>
      </div>

    </div>

    <!-- EDIT PROFILE BUTTON -->
    <div class="section">
      <button class="cloud-btn" onclick="location.href='/pages/profile/edit.html'">
        Edit Profile
      </button>
    </div>

  </div>

  <!-- FULLSCREEN MEDIA VIEWER SHELL -->
  <div id="mediaViewer" class="media-viewer-overlay">
    <div class="media-viewer-close" id="mediaViewerClose">&times;</div>
    <div class="media-viewer-content" id="mediaViewerContent"></div>
  </div>

  <script>
    // Burger menu
    const burgerMenu = document.getElementById("burgerMenu");
    const burgerLogo = document.getElementById("burgerLogo");
    const menuClose = document.getElementById("menuClose");

    burgerLogo.onclick = () => burgerMenu.classList.add("open");
    menuClose.onclick = () => burgerMenu.classList.remove("open");

    // Tabs
    const tabs = document.querySelectorAll(".profile-tab");
    const panes = {
      photos: document.getElementById("tab-photos"),
      videos: document.getElementById("tab-videos"),
      circle: document.getElementById("tab-circle"),
      story: document.getElementById("tab-story")
    };

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        const key = tab.getAttribute("data-tab");
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        Object.keys(panes).forEach(k => {
          panes[k].classList.toggle("active", k === key);
        });
      });
    });

    // Simple media viewer shell (JS worker will hook into this)
    const mediaViewer = document.getElementById("mediaViewer");
    const mediaViewerContent = document.getElementById("mediaViewerContent");
    const mediaViewerClose = document.getElementById("mediaViewerClose");

    mediaViewerClose.onclick = () => {
      mediaViewer.classList.remove("active");
      mediaViewerContent.innerHTML = "";
    };

    // Expose a basic open function for worker/JS
    window.openMediaViewer = function(html) {
      mediaViewerContent.innerHTML = html;
      mediaViewer.classList.add("active");
    };
  </script>

  <!-- CONNECTED TO WORKER VIA PROFILE JS -->
  <script type="module">
    import { loadUserProfile } from "/pages/profile/js/profile.js";

    window.userId = localStorage.getItem("cloud_user_id");
    loadUserProfile(window.userId);
  </script>

</body>
</html>
