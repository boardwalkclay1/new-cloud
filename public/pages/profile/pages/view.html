<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cloud Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/pages/profile/css/profile.css">
</head>

<body data-page="profile-view">

  <!-- Global Nav -->
  <nav class="nav">
    <div class="logo">
      <img src="/assets/img/cloud/cloud-logo.jpg" onclick="location.href='/'">
    </div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/pages/music.html">Cloud Radio</a>
      <a href="/events/index.html">Events</a>
      <a href="/network/public/pages/index.html">Network</a>
      <a href="/pages/safety/index.html">Safety CLOUD</a>
      <a href="/pages/feed/index.html">Feed</a>
      <a href="/pages/profile/index.html">Profile</a>
    </div>
  </nav>

  <!-- Permanent Cloud Chat Icon -->
  <div class="cloud-chat-icon" onclick="location.href='/pages/chat/index.html'">
    💬
  </div>

  <!-- Banner -->
  <div id="profileBanner" class="profile-banner"></div>

  <!-- Avatar + Name -->
  <div class="profile-header">
    <img id="profileAvatar" class="profile-avatar">
    <div>
      <h1 id="profileName" class="profile-name"></h1>
      <div id="profileTags" class="profile-tags"></div>
    </div>
  </div>

  <!-- Badge Preview -->
  <div class="section">
    <h2>Badges</h2>
    <div id="profileBadgePreview" class="badge-preview-row"></div>
    <button class="cloud-btn" onclick="openBadgeVault(window.viewUserId)">View All Badges</button>
  </div>

  <!-- Media -->
  <div class="section">
    <h2>Media</h2>
    <div id="profileMedia" class="media-grid"></div>
  </div>

  <!-- Message Button -->
  <div class="section">
    <button class="cloud-btn" onclick="location.href='/pages/chat/index.html?user='+window.viewUserId">
      Message User
    </button>
  </div>

  <script type="module">
    import { loadUserProfile } from "./js/profile.js";
    const params = new URLSearchParams(window.location.search);
    window.viewUserId = params.get("user");
    loadUserProfile(window.viewUserId);
  </script>

</body>
</html>
