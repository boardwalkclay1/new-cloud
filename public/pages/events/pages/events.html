<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cloud Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="/assets/img/cloud/cloud-logo.jpg">

  <!-- APPLE TOUCH ICON -->
  <link rel="apple-touch-icon" href="/assets/img/cloud/cloud-logo.jpg">

  <!-- SOCIAL PREVIEW -->
  <meta property="og:title" content="Cloud Events">
  <meta property="og:description" content="Create, host, and explore Beltline Cloud events. Workshops, rides, meetups, concerts, and more.">
  <meta property="og:image" content="/assets/img/cloud/events-cloud.jpg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://beltlinecloud.com/events">

  <!-- TWITTER CARD -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Cloud Events">
  <meta name="twitter:description" content="Create, host, and explore Beltline Cloud events.">
  <meta name="twitter:image" content="/assets/img/cloud/events-cloud.jpg">

  <link rel="stylesheet" href="/pages/events/css/events.css">
</head>

<body>

<!-- BACKGROUND -->
<div class="events-bg"></div>

<header class="events-header">
  <img src="/assets/img/cloud/events-cloud.jpg" class="events-logo">
  <h2>Cloud Events</h2>
</header>

<section class="events-section">
  <h3 class="events-section-title">Your Event Tools</h3>

  <div class="events-grid">
    <div class="events-tile" onclick="goTo('/public/pages/events/pages/create.html')">
      <div class="events-tile-icon">🎟️</div>
      <div>Create Event</div>
    </div>

    <div class="events-tile" onclick="goTo('/pages/events/pages/mine.html')">
      <div class="events-tile-icon">📁</div>
      <div>My Events</div>
    </div>
  </div>
</section>

<section class="events-section">
  <h3 class="events-section-title">Upcoming Events</h3>
  <div id="eventsFeed" class="events-grid"></div>
</section>

<script src="/pages/events/js/events.js"></script>
</body>
</html>
