<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event • Cloud Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="/assets/img/cloud/cloud-logo.jpg">

  <!-- APPLE TOUCH ICON -->
  <link rel="apple-touch-icon" href="/assets/img/cloud/cloud-logo.jpg">

  <!-- SOCIAL PREVIEW -->
  <meta property="og:title" content="Event • Cloud Events">
  <meta property="og:description" content="View full event details, ticket pricing, and purchase options on Beltline Cloud.">
  <meta property="og:image" content="/public/assets/img/cloud/events-cloud.jpg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://beltlinecloud.com/events/event">

  <!-- TWITTER CARD -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Event • Cloud Events">
  <meta name="twitter:description" content="View full event details and purchase tickets.">
  <meta name="twitter:image" content="/public/assets/img/cloud/events-cloud.jpg">

  <!-- EVENTS CSS -->
  <link rel="stylesheet" href="/pages/events/css/events.css">
</head>

<body>

<!-- BACKGROUND IN HTML -->
<div style="
  position: fixed;
  inset: 0;
  background: url('/public/assets/img/cloud/events-cloud.jpg') center/cover no-repeat;
  filter: brightness(0.35);
  z-index: -1;
"></div>

<header class="events-header">
  <img src="/assets/img/cloud/cloud-logo.jpg" class="events-logo">
  <h2 id="eventTitle">Event</h2>
</header>

<section class="events-section">
  <div id="eventDetails" class="event-details-card">
    <!-- JS injects title, date, location, description, price, host -->
  </div>

  <div class="event-ticket-panel">
    <label>Tickets
      <input type="number" id="ticketQuantity" min="1" value="1">
    </label>

    <div id="ticketPriceDisplay" class="event-price-display"></div>

    <button id="buyTicketBtn" class="events-btn-primary">
      Buy Ticket
    </button>
  </div>
</section>

<!-- UNIFIED EVENTS JS -->
<script src="/pages/events/js/events.js"></script>
</body>
</html>
