<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Messages</title>

  <link rel="stylesheet" href="/pages/messages/css/messages.css">
  <link rel="icon" type="image/jpg" href="/assets/img/cloud/cloud-logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* Prevent global img stretching */
    img { max-width: 100%; height: auto; }

    /* HEADER FIX */
    .messages-header {
      display: flex;
      align-items: center;
      padding: 10px;
      background: rgba(0,0,0,0.7);
      border-bottom: 2px solid #f7d354;
    }

    .messages-header-left {
      width: 45px;
      flex-shrink: 0;
    }

    .messages-header-center {
      flex: 1;
      text-align: center;
    }

    .messages-title {
      font-family: Cinzel;
      font-size: 26px;
      color: #f7d354;
      text-shadow: 0 0 8px #f7d354;
    }

    /* CLOUDTALK ICON = BURGER MENU TRIGGER */
    #menuTrigger {
      width: 45px !important;
      height: 45px !important;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #f7d354;
      cursor: pointer;
      flex-shrink: 0;
    }

    .messages-header-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 60px;
      flex-shrink: 0;
    }

    /* BURGER MENU */
    #cloudMenu {
      position: fixed;
      top: 0;
      left: -100%;
      width: 300px;
      height: 100%;
      background: rgba(0,0,0,0.92);
      padding: 25px;
      transition: 0.35s ease;
      z-index: 9999;
      overflow-y: auto;
      border-right: 2px solid #f7d354;
    }

    #cloudMenu.open {
      left: 0;
    }

    .menu-header img {
      width: 70px;
      border-radius: 50%;
      border: 2px solid #f7d354;
    }

    .menu-close {
      font-size: 32px;
      color: #f7d354;
      cursor: pointer;
      float: right;
    }

    .menu-category h3 {
      color: #f7d354;
      font-family: Cinzel;
      margin-top: 25px;
      margin-bottom: 10px;
    }

    .menu-category a {
      display: block;
      padding: 8px 0;
      color: white;
      text-decoration: none;
      font-size: 1rem;
    }

    .menu-category a:hover {
      color: #00b86b;
    }
  </style>
</head>

<body>

<div class="messages-bg"></div>

<!-- BURGER MENU -->
<div id="cloudMenu">
  <div class="menu-header">
    <img src="/assets/img/cloud/cloud-logo.jpg" alt="Cloud Logo">
    <span class="menu-close" id="menuClose">&times;</span>
  </div>

  <div class="menu-content">

    <div class="menu-category">
      <h3>My Profile</h3>
      <a href="/pages/profile.html">View Profile</a>
      <a href="/pages/notifications.html">Notifications</a>
      <a href="/pages/settings.html">Settings</a>
    </div>

    <div class="menu-category">
      <h3>Messages</h3>
      <a href="/pages/messages/messages.html">Inbox</a>
      <a href="/pages/messages/messages.html?view=requests">Message Requests</a>
      <a href="/pages/messages/messages.html?view=settings">Message Settings</a>
    </div>

    <div class="menu-category">
      <h3>Safety Cloud</h3>
      <a href="/pages/safety/index.html">Safety Overview</a>
      <a href="/pages/safety/lost-found.html">Lost & Found</a>
      <a href="/pages/safety/stolen.html">Stolen Items</a>
      <a href="/pages/safety/markers.html">Marker System</a>
      <a href="/pages/safety/live-feed.html">Live Feed</a>
      <a href="/pages/safety/alerts.html">Alerts</a>
    </div>

    <div class="logout-btn-menu" onclick="logout()">Logout</div>

  </div>
</div>

<!-- HEADER -->
<header class="messages-header">

  <div class="messages-header-left"></div>

  <div class="messages-header-center">
    <span class="messages-title">Cloud Messages</span>
  </div>

  <div class="messages-header-right">
    <img src="/assets/img/cloud/cloud-talkk-logo.jpg" id="menuTrigger" alt="Menu">
  </div>

</header>

<!-- MAIN VIEW -->
<div id="messages-view" class="messages-view"></div>

<!-- FOOTER NAV -->
<div class="messages-footer">
  <button onclick="switchMessagesView('inbox')" class="footer-btn">Inbox</button>
  <button onclick="switchMessagesView('requests')" class="footer-btn">Requests</button>
  <button onclick="switchMessagesView('compose')" class="footer-btn">Compose</button>
  <button onclick="switchMessagesView('settings')" class="footer-btn">Settings</button>
</div>

<script type="module" src="/pages/messages/js/messages.js"></script>

<script>
  // BURGER MENU LOGIC
  const menu = document.getElementById("cloudMenu");
  const trigger = document.getElementById("menuTrigger");
  const closeBtn = document.getElementById("menuClose");

  trigger.onclick = () => menu.classList.add("open");
  closeBtn.onclick = () => menu.classList.remove("open");
</script>

</body>
</html>
