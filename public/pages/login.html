<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Beltline Cloud</title>

  <link rel="icon" type="image/png" href="/assets/img/logo/cloud-logo.png" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('/assets/img/cloud/cloud-signupp.jpg') center/cover no-repeat;
      color: white;
      font-family: "Inter", sans-serif;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 20px;
      background: rgba(0,0,0,0.55);
      border-radius: 14px;
      margin-top: 60px;
    }
    h1 {
      text-align: center;
      color: #ffd700;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      background: #111726;
      border: 1px solid #222b40;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #ffd700;
      color: black;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    p {
      text-align: center;
      margin-top: 20px;
      opacity: 0.8;
    }
    a {
      color: #ffd700;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome Back</h1>

    <input id="email" type="email" placeholder="Email Address" />
    <input id="password" type="password" placeholder="Password" />

    <button id="loginBtn">Log In</button>

    <p>Don’t have an account? <a href="/pages/signup.html">Create one</a></p>
  </div>

  <script src="/js/auth-cloud-standalone.js"></script>

  <script>
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Please fill out all fields");
        return;
      }

      try {
        const user = await AuthStandalone.login(email, password);

        if (user) {
          window.location.href = "/pages/dashboard.html";
        }

      } catch (err) {
        alert(err.message || "Login failed.");
      }
    });
  </script>
</body>
</html>
