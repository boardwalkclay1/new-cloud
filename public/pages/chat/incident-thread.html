<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Incident Response Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/pages/chat/css/chat.css">
  <link rel="stylesheet" href="/pages/chat/css/voice.css">
</head>

<body data-page="incident-thread">

  <div class="thread-header">
    <button onclick="history.back()" class="back-btn">←</button>
    <h2>Incident Response</h2>
  </div>

  <div id="messageBox" class="message-box"></div>

  <div class="voice-bar">
    <button id="recordBtn">🎙️ Hold to Talk</button>
  </div>

  <div class="message-input">
    <input id="msgInput" type="text" placeholder="Type a message…">
    <button id="sendBtn">Send</button>
  </div>

  <script type="module">
    import { loadIncidentThread, sendMessage } from "./js/chat.js";
    import { initVoice } from "./js/voice.js";

    const params = new URLSearchParams(window.location.search);
    const incidentId = params.get("incident");
    const userId = localStorage.getItem("cloud_user_id");

    loadIncidentThread(incidentId, userId);

    document.getElementById("sendBtn").onclick = () => {
      const text = document.getElementById("msgInput").value;
      sendMessage(incidentId, userId, text, true);
      document.getElementById("msgInput").value = "";
    };

    initVoice(incidentId, userId);
  </script>

</body>
</html>
